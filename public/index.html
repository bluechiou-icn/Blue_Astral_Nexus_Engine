<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÆTHNOUS · Astral Nexus Engine</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d1a;
    color: #e8dcc8;
    font-family: "PingFang TC", "Microsoft JhengHei", "Heiti TC", sans-serif;
    min-height: 100vh;
    padding: 40px 16px 80px;
  }

  /* ── 頂部品牌 ── */
  .brand {
    text-align: center;
    margin-bottom: 40px;
  }
  .brand-title {
    font-size: clamp(22px, 5vw, 36px);
    letter-spacing: 0.35em;
    color: #d4af37;
    font-weight: 300;
    margin-bottom: 6px;
  }
  .brand-sub {
    font-size: 12px;
    letter-spacing: 0.2em;
    color: #7a6a4a;
    text-transform: uppercase;
  }

  /* ── 卡片 ── */
  .card {
    background: #13132a;
    border: 1px solid #2a2550;
    border-radius: 4px;
    padding: 28px 24px;
    max-width: 620px;
    margin: 0 auto 24px;
  }
  .card-title {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: #7a6a4a;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid #1e1e3a;
  }

  /* ── 表單 ── */
  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 12px;
    color: #9a8a6a;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .field input, .field select {
    width: 100%;
    background: #0d0d1a;
    border: 1px solid #2a2550;
    color: #e8dcc8;
    padding: 10px 12px;
    font-size: 14px;
    border-radius: 2px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus {
    border-color: #d4af37;
  }
  .field input::placeholder { color: #3a3a5a; }

  /* 兩欄排版 */
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* Radio / Checkbox 群組 */
  .radio-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .radio-group label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #c8b890;
    cursor: pointer;
    padding: 7px 12px;
    border: 1px solid #2a2550;
    border-radius: 2px;
    transition: border-color 0.2s;
    margin-bottom: 0;
    letter-spacing: 0;
  }
  .radio-group input[type=radio] { width: auto; accent-color: #d4af37; }
  .radio-group label:has(input:checked) { border-color: #d4af37; color: #d4af37; }

  /* 選填標記 */
  .optional {
    font-size: 10px;
    color: #4a4a6a;
    margin-left: 6px;
    letter-spacing: 0;
  }

  /* Mode 說明 */
  .mode-note {
    font-size: 11px;
    color: #6a5a3a;
    margin-top: 6px;
    line-height: 1.5;
  }

  /* 提交按鈕 */
  .btn-submit {
    width: 100%;
    padding: 13px;
    background: transparent;
    border: 1px solid #d4af37;
    color: #d4af37;
    font-size: 13px;
    letter-spacing: 0.3em;
    cursor: pointer;
    border-radius: 2px;
    margin-top: 6px;
    transition: background 0.2s, color 0.2s;
    font-family: inherit;
  }
  .btn-submit:hover { background: #d4af37; color: #0d0d1a; }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Loading ── */
  .loading {
    text-align: center;
    padding: 40px;
    display: none;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid #2a2550;
    border-top-color: #d4af37;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 結果區 ── */
  #result { display: none; }

  /* Mode Badge */
  .mode-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 2px;
    font-size: 11px;
    letter-spacing: 0.15em;
    margin-bottom: 20px;
  }
  .mode-badge.analysis {
    background: rgba(212, 175, 55, 0.1);
    border: 1px solid #d4af37;
    color: #d4af37;
  }
  .mode-badge.preview {
    background: rgba(80, 80, 120, 0.2);
    border: 1px solid #3a3a6a;
    color: #7a7aaa;
  }

  /* 命盤基本資訊 */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .info-item {
    background: #0d0d1a;
    border: 1px solid #1e1e3a;
    padding: 10px 14px;
    border-radius: 2px;
  }
  .info-label {
    font-size: 10px;
    color: #6a5a3a;
    letter-spacing: 0.15em;
    margin-bottom: 4px;
  }
  .info-value {
    font-size: 15px;
    color: #e8dcc8;
  }
  .info-value.gold { color: #d4af37; }

  /* 定盤警示 */
  .rectification-notice {
    background: rgba(180, 100, 50, 0.1);
    border: 1px solid #6a3a1a;
    border-radius: 2px;
    padding: 10px 14px;
    font-size: 12px;
    color: #c08050;
    margin-bottom: 16px;
  }

  /* Section 標題 */
  .section-title {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: #7a6a4a;
    text-transform: uppercase;
    margin: 20px 0 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #1e1e3a;
  }

  /* 四化表格 */
  .mutagen-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid #1a1a2e;
    font-size: 13px;
  }
  .mutagen-row:last-child { border-bottom: none; }
  .mutagen-type {
    width: 44px;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 2px;
    text-align: center;
    flex-shrink: 0;
  }
  .t-luk  { background: rgba(74, 222, 128, 0.15); color: #4ade80; border: 1px solid #1a5a30; }
  .t-kuen { background: rgba(251, 191, 36, 0.15); color: #fbbf24; border: 1px solid #5a4a10; }
  .t-sci  { background: rgba(147, 197, 253, 0.15); color: #93c5fd; border: 1px solid #1a3a5a; }
  .t-chi  { background: rgba(248, 113, 113, 0.15); color: #f87171; border: 1px solid #5a1a1a; }
  .mutagen-star { color: #e8dcc8; font-weight: 500; }
  .mutagen-palace { color: #9a8a6a; font-size: 12px; }
  .mutagen-arrow { color: #3a3a5a; }

  /* 宮位列表 */
  .palace-item {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid #1a1a2e;
    align-items: start;
    font-size: 13px;
  }
  .palace-item:last-child { border-bottom: none; }
  .palace-name {
    color: #c8a860;
    font-size: 12px;
  }
  .palace-sb {
    font-size: 10px;
    color: #4a4a6a;
    margin-top: 2px;
  }
  .palace-badge {
    display: inline-block;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 1px;
    margin-left: 4px;
    vertical-align: middle;
  }
  .badge-body     { border: 1px solid #f59e0b; color: #f59e0b; }
  .badge-original { border: 1px solid #60a5fa; color: #60a5fa; }
  .palace-stars { color: #e8dcc8; line-height: 1.7; }
  .star-bright {
    font-size: 10px;
    color: #5a7a9a;
    margin-left: 2px;
  }
  .star-empty { color: #3a3a5a; font-style: italic; font-size: 12px; }
  .borrowed-note { font-size: 11px; color: #6a5a3a; margin-top: 2px; }

  /* 大限表格 */
  .limit-row {
    display: grid;
    grid-template-columns: 26px 70px 80px 1fr;
    gap: 8px;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid #1a1a2e;
    font-size: 12px;
  }
  .limit-row:last-child { border-bottom: none; }
  .limit-row.current {
    background: rgba(212, 175, 55, 0.05);
    padding: 7px 8px;
    border-radius: 2px;
    border: 1px solid rgba(212, 175, 55, 0.2);
    margin: 4px -8px;
  }
  .limit-order { color: #4a4a6a; text-align: center; }
  .limit-palace { color: #c8a860; }
  .limit-years { color: #7a6a4a; }
  .limit-range { color: #6a5a3a; }
  .current-marker {
    font-size: 9px;
    color: #d4af37;
    letter-spacing: 0.1em;
    margin-left: 4px;
  }

  /* Preview 提示 */
  .preview-cta {
    text-align: center;
    padding: 20px;
    border: 1px dashed #2a2550;
    border-radius: 2px;
    margin-top: 20px;
  }
  .preview-cta p { font-size: 12px; color: #6a5a3a; line-height: 1.8; }

  /* Error */
  .error-box {
    background: rgba(180, 50, 50, 0.1);
    border: 1px solid #5a1a1a;
    border-radius: 2px;
    padding: 14px;
    color: #f87171;
    font-size: 13px;
    display: none;
  }
</style>
</head>

<body>

<!-- 品牌標題 -->
<div class="brand">
  <div class="brand-title">Æ &thinsp; T &thinsp; H &thinsp; N &thinsp; O &thinsp; U &thinsp; S</div>
  <div class="brand-sub">Astral Nexus Engine · Internal Research Tool</div>
</div>

<!-- 輸入表單 -->
<div class="card" id="form-card">
  <div class="card-title">命主資料</div>

  <div class="field">
    <label>命主姓名 <span class="optional">選填</span></label>
    <input type="text" id="f-name" placeholder="姓名或代稱">
  </div>

  <div class="row-2">
    <div class="field">
      <label>西曆生日</label>
      <input type="date" id="f-date" required>
    </div>
    <div class="field">
      <label>出生時間</label>
      <input type="time" id="f-time" required>
    </div>
  </div>

  <div class="field">
    <label>性別</label>
    <div class="radio-group">
      <label><input type="radio" name="gender" value="男" checked> 男</label>
      <label><input type="radio" name="gender" value="女"> 女</label>
    </div>
  </div>

  <div class="field">
    <label>出生城市 <span class="optional">選填，供真太陽時校正參考</span></label>
    <input type="text" id="f-city" placeholder="例：台北、香港、首爾">
  </div>

  <div class="field">
    <label>出生時間確定度</label>
    <select id="f-timecert">
      <option value="certain">確定（出生記錄、戶籍等）</option>
      <option value="approx">大約（±30分鐘以內）</option>
      <option value="unknown">不清楚（需定盤）</option>
    </select>
  </div>

  <div class="field">
    <label>目前關係狀態 <span class="optional">選填</span></label>
    <div class="radio-group">
      <label><input type="radio" name="relation" value="single"> 單身</label>
      <label><input type="radio" name="relation" value="dating"> 穩定交往</label>
      <label><input type="radio" name="relation" value="married"> 已婚</label>
      <label><input type="radio" name="relation" value="divorced"> 離婚</label>
      <label><input type="radio" name="relation" value="widowed"> 喪偶</label>
      <label><input type="radio" name="relation" value="undisclosed"> 不透露</label>
    </div>
  </div>

  <div class="field">
    <label>訂單編號 <span class="optional">選填</span></label>
    <input type="text" id="f-order" placeholder="例：GUM-20260523-001">
    <div class="mode-note">填入訂單編號 → Analysis Mode（標記為正式分析案例）<br>未填 → Preview Mode（僅供參考，資料不進入系統）</div>
  </div>

  <div class="error-box" id="form-error"></div>

  <button class="btn-submit" onclick="submit()">起 盤</button>
</div>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div style="font-size:12px;color:#6a5a3a;letter-spacing:0.2em;">命盤計算中</div>
</div>

<!-- 結果 -->
<div id="result">
  <div class="card">
    <div id="mode-badge-container"></div>
    <div id="rectification-notice"></div>

    <div class="section-title">命盤基本資訊</div>
    <div class="info-grid" id="basic-info"></div>

    <div class="section-title">生年四化</div>
    <div id="mutagens"></div>

    <div class="section-title">十二宮位主星</div>
    <div id="palaces"></div>

    <div class="section-title">十年大限</div>
    <div id="limits"></div>

    <div id="preview-cta"></div>
  </div>
</div>

<script>
// ── 狀態 ────────────────────────────────────────────────────────
let clientData = {};

// ── 提交 ────────────────────────────────────────────────────────
async function submit() {
  const date     = document.getElementById('f-date').value;
  const time     = document.getElementById('f-time').value;
  const gender   = document.querySelector('input[name=gender]:checked')?.value;
  const name     = document.getElementById('f-name').value.trim();
  const city     = document.getElementById('f-city').value.trim();
  const timecert = document.getElementById('f-timecert').value;
  const relation = document.querySelector('input[name=relation]:checked')?.value || 'undisclosed';
  const order    = document.getElementById('f-order').value.trim();
  const errBox   = document.getElementById('form-error');

  errBox.style.display = 'none';

  if (!date || !time || !gender) {
    errBox.textContent = '請填寫生日、時間和性別。';
    errBox.style.display = 'block';
    return;
  }

  clientData = { name, city, timecert, relation, order };

  document.getElementById('form-card').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').style.display = 'none';

  try {
    const url = `/api/chart?date=${date}&time=${time}&gender=${encodeURIComponent(gender)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`API 錯誤：${res.status}`);
    const data = await res.json();
    renderResult(data);
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('form-card').style.display = 'block';
    errBox.textContent = '命盤計算失敗，請稍後再試。（' + e.message + '）';
    errBox.style.display = 'block';
  }
}

// ── 渲染結果 ────────────────────────────────────────────────────
function renderResult(d) {
  const isAnalysis = !!clientData.order;
  const needRect   = clientData.timecert !== 'certain';

  // Mode Badge
  const badgeEl = document.getElementById('mode-badge-container');
  badgeEl.innerHTML = isAnalysis
    ? `<div class="mode-badge analysis">▸ ANALYSIS MODE &nbsp;·&nbsp; ${clientData.order}</div>`
    : `<div class="mode-badge preview">▸ PREVIEW MODE &nbsp;·&nbsp; 僅供參考</div>`;

  // 定盤警示
  const rectEl = document.getElementById('rectification-notice');
  if (needRect) {
    const msg = clientData.timecert === 'approx'
      ? '出生時間為估計值（±30分鐘），建議進行定盤確認後再論斷。'
      : '出生時間不確定，需定盤後方可進行完整論斷。';
    rectEl.innerHTML = `<div class="rectification-notice">⚠ ${msg}</div>`;
  } else {
    rectEl.innerHTML = '';
  }

  // 基本資訊
  const now = new Date().getFullYear();
  const age = now - parseInt(d.input?.solarDate?.split('-')[0] || d.meta?.solarDate?.split('-')[0]) + 1;
  const nameDisplay = clientData.name || '（未填）';
  const cityDisplay = clientData.city || '—';
  const relMap = { single:'單身', dating:'穩定交往', married:'已婚', divorced:'離婚', widowed:'喪偶', undisclosed:'未填' };

  document.getElementById('basic-info').innerHTML = `
    <div class="info-item"><div class="info-label">命主</div><div class="info-value">${nameDisplay}</div></div>
    <div class="info-item"><div class="info-label">五行局</div><div class="info-value gold">${d.fiveElementsClass}</div></div>
    <div class="info-item"><div class="info-label">農曆生日</div><div class="info-value">${d.lunarDate}</div></div>
    <div class="info-item"><div class="info-label">時辰</div><div class="info-value">${d.shichen}</div></div>
    <div class="info-item"><div class="info-label">身宮</div><div class="info-value">${d.bodyPalace?.name ?? '—'}（${d.bodyPalace?.stemBranch ?? ''}）</div></div>
    <div class="info-item"><div class="info-label">來因宮</div><div class="info-value">${d.originalPalace?.name ?? '—'}（${d.originalPalace?.stemBranch ?? ''}）</div></div>
    <div class="info-item"><div class="info-label">出生城市</div><div class="info-value">${cityDisplay}</div></div>
    <div class="info-item"><div class="info-label">關係狀態</div><div class="info-value">${relMap[clientData.relation] ?? '—'}</div></div>
  `;

  // 生年四化
  const mutagenEl = document.getElementById('mutagens');
  const typeClass = { '化祿':'t-luk','化權':'t-kuen','化科':'t-sci','化忌':'t-chi' };
  mutagenEl.innerHTML = (d.yearMutagens || []).map(m => `
    <div class="mutagen-row">
      <span class="mutagen-type ${typeClass[m.type] || ''}">${m.type}</span>
      <span class="mutagen-star">${m.star}</span>
      <span class="mutagen-arrow">→</span>
      <span class="mutagen-palace">${m.palace ?? m.targetPalace ?? '—'}</span>
    </div>
  `).join('');

  // 十二宮位
  const palacesEl = document.getElementById('palaces');
  palacesEl.innerHTML = (d.palaces || []).map(p => {
    const badges = [
      p.isBodyPalace     ? '<span class="palace-badge badge-body">身</span>' : '',
      p.isOriginalPalace ? '<span class="palace-badge badge-original">來</span>' : '',
    ].join('');

    let starsHtml = '';
    if (p.majorStars && p.majorStars.length > 0) {
      starsHtml = p.majorStars.map(s => {
        const bright = s.brightness ? `<span class="star-bright">${s.brightness}</span>` : '';
        const mut    = s.yearMutagen ? ` <span class="mutagen-type ${typeClass[s.yearMutagen] || ''}" style="font-size:9px;padding:1px 4px;">${s.yearMutagen.replace('化','')}</span>` : '';
        return `${s.name}${bright}${mut}`;
      }).join('　');
    } else if (p.isEmpty && p.borrowedFromPalace) {
      starsHtml = `<span class="star-empty">（空宮）</span>
        <div class="borrowed-note">借對宮 ${p.borrowedFromPalace}：${(p.borrowedStars || []).join('、')}</div>`;
    } else {
      starsHtml = '<span class="star-empty">（無主星）</span>';
    }

    return `
      <div class="palace-item">
        <div>
          <div class="palace-name">${p.name}${badges}</div>
          <div class="palace-sb">${p.stemBranch}</div>
        </div>
        <div class="palace-stars">${starsHtml}</div>
      </div>
    `;
  }).join('');

  // 大限
  const limitsEl = document.getElementById('limits');
  const nowYear  = new Date().getFullYear();
  limitsEl.innerHTML = (d.majorLimits || []).map(l => {
    const isCur = nowYear >= l.startYear && nowYear <= l.endYear;
    const cls   = isCur ? 'limit-row current' : 'limit-row';
    const marker = isCur ? '<span class="current-marker">▶ 現在</span>' : '';
    return `
      <div class="${cls}">
        <div class="limit-order">${l.order}</div>
        <div class="limit-palace">${l.palace}${marker}</div>
        <div class="limit-years">${l.startAge}–${l.endAge} 歲</div>
        <div class="limit-range">${l.startYear}–${l.endYear}</div>
      </div>
    `;
  }).join('');

  // Preview CTA
  if (!isAnalysis) {
    document.getElementById('preview-cta').innerHTML = `
      <div class="preview-cta">
        <p>這是預覽結果，資料不會進入分析系統。<br>如需完整命盤解析報告，請透過 ÆTHNOUS 預約諮詢服務。</p>
      </div>
    `;
  } else {
    document.getElementById('preview-cta').innerHTML = '';
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('result').style.display = 'block';
}
</script>
</body>
</html>
