<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ÆTHNOUS · Astral Nexus Engine</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #1a1a2e;
      --bg2:   #16213e;
      --gold:  #d4af37;
      --dim:   #8888aa;
      --white: #e8e8f0;
      --r:     8px;
      --font:  "PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    }

    body { background:var(--bg); color:var(--white); font-family:var(--font); min-height:100vh; padding:2rem 1rem 5rem; }

    /* ── Header ── */
    header { text-align:center; padding:2.5rem 0 2rem; border-bottom:1px solid rgba(212,175,55,.2); margin-bottom:2.5rem; }
    .brand-title { font-size:clamp(1.8rem,5vw,3rem); font-weight:300; letter-spacing:.6em; color:var(--gold); margin-bottom:.5rem; }
    .brand-sub   { font-size:.85rem; letter-spacing:.3em; color:var(--dim); text-transform:uppercase; }

    /* ── Layout ── */
    .container { max-width:760px; margin:0 auto; }

    /* ── Card ── */
    .card { background:var(--bg2); border:1px solid rgba(212,175,55,.15); border-radius:var(--r); padding:2rem; margin-bottom:2rem; }
    .card-title { font-size:.72rem; letter-spacing:.2em; color:var(--gold); text-transform:uppercase; margin-bottom:1.5rem; padding-bottom:.5rem; border-bottom:1px solid rgba(212,175,55,.15); }

    /* ── Form ── */
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; }
    @media(max-width:480px){ .form-grid{ grid-template-columns:1fr; } }
    .form-group { display:flex; flex-direction:column; gap:.4rem; }
    .form-group.full { grid-column:1/-1; }
    label { font-size:.75rem; letter-spacing:.1em; color:var(--dim); text-transform:uppercase; }

    input[type="text"], input[type="date"], input[type="time"] {
      background:var(--bg); border:1px solid rgba(212,175,55,.25); border-radius:4px;
      color:var(--white); font-family:var(--font); font-size:.95rem;
      padding:.6rem .8rem; outline:none; transition:border-color .2s; width:100%; color-scheme:dark;
    }
    input:focus { border-color:var(--gold); }

    .radio-group { display:flex; gap:2rem; align-items:center; padding-top:.2rem; }
    .radio-group label { display:flex; align-items:center; gap:.5rem; color:var(--white); font-size:.95rem; letter-spacing:0; text-transform:none; cursor:pointer; }
    input[type="radio"] { accent-color:var(--gold); width:1rem; height:1rem; cursor:pointer; }

    .btn-submit { width:100%; margin-top:1.5rem; padding:.8rem; background:transparent; border:1px solid var(--gold); border-radius:var(--r); color:var(--gold); font-family:var(--font); font-size:1rem; letter-spacing:.3em; cursor:pointer; transition:background .2s,color .2s; }
    .btn-submit:hover { background:var(--gold); color:var(--bg); }
    .btn-submit:disabled { opacity:.4; cursor:not-allowed; }

    /* ── Loading ── */
    .loading { display:none; text-align:center; padding:2rem; color:var(--gold); font-size:.85rem; letter-spacing:.2em; }
    .spinner { display:inline-block; width:28px; height:28px; border:2px solid rgba(212,175,55,.2); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; margin-bottom:.8rem; }
    @keyframes spin { to{ transform:rotate(360deg); } }

    /* ── Error ── */
    .error { display:none; background:rgba(192,57,43,.15); border:1px solid rgba(192,57,43,.4); border-radius:var(--r); padding:1rem 1.2rem; color:#e74c3c; font-size:.9rem; margin-bottom:1.5rem; }

    /* ── Result ── */
    #result { display:none; }
    .info-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:.8rem; margin-bottom:1rem; }
    .info-item { display:flex; flex-direction:column; gap:.2rem; }
    .info-label { font-size:.7rem; letter-spacing:.1em; color:var(--dim); text-transform:uppercase; }
    .info-value { font-size:1rem; color:var(--white); }

    /* ── Badges ── */
    .mutagen-row { display:flex; gap:.6rem; flex-wrap:wrap; margin-bottom:.5rem; align-items:center; }
    .badge { display:inline-block; padding:.15rem .5rem; border-radius:3px; font-size:.78rem; font-weight:600; color:#fff; }
    .badge-lu   { background:#27ae60; }
    .badge-quan { background:#e67e22; }
    .badge-ke   { background:#2980b9; }
    .badge-ji   { background:#c0392b; }

    /* ── Palace list ── */
    .palace-list { display:flex; flex-direction:column; gap:.6rem; }
    .palace-row { display:flex; align-items:baseline; gap:.8rem; padding:.5rem .8rem; border-radius:4px; background:rgba(255,255,255,.03); border-left:2px solid transparent; font-size:.88rem; }
    .palace-row.has-body { border-left-color:var(--gold); }
    .palace-row.is-empty { opacity:.65; }
    .pal-name { min-width:3.5em; color:var(--gold); font-size:.85rem; }
    .pal-sb   { min-width:2.5em; color:var(--dim); font-size:.75rem; }
    .pal-stars { flex:1; color:var(--white); }
    .pal-tag  { font-size:.7rem; color:var(--dim); margin-left:.3rem; border:1px solid rgba(212,175,55,.35); padding:.05rem .3rem; border-radius:2px; }
    .bri-bright { color:#f1c40f; }
    .bri-dim    { color:#888; }

    /* ── Table ── */
    table { width:100%; border-collapse:collapse; font-size:.85rem; }
    th { text-align:left; padding:.4rem .6rem; color:var(--gold); font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; border-bottom:1px solid rgba(212,175,55,.2); }
    td { padding:.45rem .6rem; border-bottom:1px solid rgba(255,255,255,.05); }
    tr.current-limit { background:rgba(212,175,55,.08); }
    tr.current-limit td { color:var(--gold); font-weight:600; }

    /* ── Lang toggle ── */
    .lang-bar { text-align:center; margin-top:3rem; margin-bottom:1rem; }
    .lang-btn { background:transparent; border:1px solid rgba(212,175,55,.35); border-radius:20px; color:var(--dim); font-family:var(--font); font-size:.78rem; letter-spacing:.1em; padding:.35rem 1.2rem; cursor:pointer; transition:border-color .2s, color .2s; }
    .lang-btn:hover { border-color:var(--gold); color:var(--gold); }

    /* ── Footer ── */
    footer { text-align:center; margin-top:1.5rem; color:var(--dim); font-size:.72rem; letter-spacing:.15em; }
  </style>
</head>
<body>

<header>
  <div class="brand-title">Æ T H N O U S</div>
  <div class="brand-sub">Astral Nexus Engine</div>
</header>

<div class="container">

  <!-- Input form -->
  <div class="card">
    <div class="card-title" data-i18n="form_title">Chart Input</div>
    <form id="chartForm">
      <div class="form-grid">
        <div class="form-group">
          <label for="name" data-i18n="label_name">Name (Optional)</label>
          <input type="text" id="name" data-i18n-ph="ph_name" placeholder="Chart Subject Name">
        </div>
        <div class="form-group">
          <label for="date" data-i18n="label_date">Solar Date</label>
          <input type="date" id="date" required>
        </div>
        <div class="form-group">
          <label for="time" data-i18n="label_time">Birth Time</label>
          <input type="time" id="time" required>
        </div>
        <div class="form-group">
          <label data-i18n="label_gender">Gender</label>
          <div class="radio-group">
            <label><input type="radio" name="gender" value="男" checked> <span data-i18n="gender_male">Male</span></label>
            <label><input type="radio" name="gender" value="女"> <span data-i18n="gender_female">Female</span></label>
          </div>
        </div>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn" data-i18n="btn_cast">C A S T &nbsp; C H A R T</button>
    </form>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div><br>
    <span data-i18n="loading">Casting chart...</span>
  </div>

  <!-- Error -->
  <div class="error" id="errorBox"></div>

  <!-- Result -->
  <div id="result">

    <div class="card">
      <div class="card-title" data-i18n="sec_info">Chart Information</div>
      <div class="info-grid" id="basicInfo"></div>
    </div>

    <div class="card">
      <div class="card-title" data-i18n="sec_mutagen">Year Four Transformations</div>
      <div id="yearMutagens"></div>
    </div>

    <div class="card">
      <div class="card-title" data-i18n="sec_palaces">Twelve Palaces</div>
      <div class="palace-list" id="palaceList"></div>
    </div>

    <div class="card">
      <div class="card-title" data-i18n="sec_limits">Major Limits</div>
      <table>
        <thead>
          <tr>
            <th data-i18n="th_order">Order</th>
            <th data-i18n="th_palace">Palace</th>
            <th data-i18n="th_stem">Stem</th>
            <th data-i18n="th_year">Year Range</th>
            <th data-i18n="th_age">Age</th>
          </tr>
        </thead>
        <tbody id="majorLimits"></tbody>
      </table>
    </div>

  </div><!-- /#result -->

</div><!-- /.container -->

<!-- Language toggle -->
<div class="lang-bar">
  <button class="lang-btn" id="langBtn" onclick="toggleLang()">切換繁體中文</button>
</div>

<footer>© ÆTHNOUS &nbsp;·&nbsp; Internal Research Tool &nbsp;·&nbsp; Not for Distribution</footer>

<script>
// ── i18n ─────────────────────────────────────────────────────
const I18N = {
  en: {
    form_title:   'Chart Input',
    label_name:   'Name (Optional)',
    ph_name:      'Chart Subject Name',
    label_date:   'Solar Date',
    label_time:   'Birth Time',
    label_gender: 'Gender',
    gender_male:  'Male',
    gender_female:'Female',
    btn_cast:     'C A S T   C H A R T',
    loading:      'Casting chart...',
    sec_info:     'Chart Information',
    sec_mutagen:  'Year Four Transformations',
    sec_palaces:  'Twelve Palaces',
    sec_limits:   'Major Limits',
    th_order:     'Order',
    th_palace:    'Palace',
    th_stem:      'Stem',
    th_year:      'Year Range',
    th_age:       'Age',
    info_name:    'Name',
    info_lunar:   'Lunar Date',
    info_five:    'Five Elements',
    info_yinyang: 'Yin Yang',
    info_body:    'Body Palace',
    info_origin:  'Origin Palace',
    info_ming:    'Life Star',
    info_shen:    'Body Star',
    tag_body:     'Body',
    tag_origin:   'Origin',
    borrowed_lbl: 'Empty · Borrows',
    limit_order:  (n) => `Limit ${n}`,
    lang_toggle:  '切換繁體中文',
  },
  zh: {
    form_title:   '起 盤 資 料',
    label_name:   '命主姓名（選填）',
    ph_name:      '命主姓名',
    label_date:   '西曆生日',
    label_time:   '出生時間',
    label_gender: '性別',
    gender_male:  '男',
    gender_female:'女',
    btn_cast:     '起 盤',
    loading:      '排 盤 中',
    sec_info:     '命 盤 資 訊',
    sec_mutagen:  '生 年 四 化',
    sec_palaces:  '十 二 宮 位',
    sec_limits:   '十 年 大 限',
    th_order:     '限序',
    th_palace:    '宮位',
    th_stem:      '宮干',
    th_year:      '年份',
    th_age:       '年齡',
    info_name:    '命主',
    info_lunar:   '農曆',
    info_five:    '五行局',
    info_yinyang: '陰陽',
    info_body:    '身宮',
    info_origin:  '來因宮',
    info_ming:    '命主星',
    info_shen:    '身主星',
    tag_body:     '身宮',
    tag_origin:   '來因',
    borrowed_lbl: '空宮 借',
    limit_order:  (n) => `第 ${n} 限`,
    lang_toggle:  'Switch to English',
  },
};

let lang = 'en';

function t(key, ...args) {
  const val = I18N[lang][key];
  return typeof val === 'function' ? val(...args) : (val ?? key);
}

function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const val = I18N[lang][key];
    if (val !== undefined && typeof val !== 'function') el.textContent = val;
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const key = el.getAttribute('data-i18n-ph');
    const val = I18N[lang][key];
    if (val) el.placeholder = val;
  });
  document.getElementById('langBtn').textContent = t('lang_toggle');
  document.documentElement.lang = lang === 'zh' ? 'zh-TW' : 'en';
  // Re-render result if visible
  if (document.getElementById('result').style.display !== 'none' && lastData) {
    renderAll(lastData, lastName);
  }
}

function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  applyLang();
}

// ── Render helpers ────────────────────────────────────────────
const BADGE_CLS = { '化祿':'badge-lu','化權':'badge-quan','化科':'badge-ke','化忌':'badge-ji' };
const BRI_CLS   = { '廟':'bri-bright','旺':'bri-bright','得':'','利':'','平':'','不':'bri-dim','陷':'bri-dim','不利':'bri-dim' };

function badge(type) {
  return `<span class="badge ${BADGE_CLS[type]||''}">${type}</span>`;
}

function renderAll(data, name) {
  // Basic info
  const items = [
    name ? [t('info_name'), name] : null,
    [t('info_lunar'),   data.lunarDate],
    [t('info_five'),    data.fiveElementsClass],
    [t('info_yinyang'), data.yinYang],
    [t('info_body'),    data.bodyPalace   ? data.bodyPalace.name   + '　' + data.bodyPalace.stemBranch   : '—'],
    [t('info_origin'),  data.originalPalace ? data.originalPalace.name + '　' + data.originalPalace.stemBranch : '—'],
    [t('info_ming'),    data.lifeStars?.mingZhu],
    [t('info_shen'),    data.lifeStars?.shenZhu],
  ].filter(Boolean);
  document.getElementById('basicInfo').innerHTML = items.map(([lbl,val]) =>
    `<div class="info-item"><span class="info-label">${lbl}</span><span class="info-value">${val ?? '—'}</span></div>`
  ).join('');

  // Year mutagens
  document.getElementById('yearMutagens').innerHTML = data.yearMutagens.map(m =>
    `<div class="mutagen-row">${badge(m.type)}<span>${m.star}</span><span style="color:var(--dim);font-size:.82rem">→ ${m.palace ?? '—'}</span></div>`
  ).join('');

  // Palaces
  const ORDER = ['命宮','兄弟','夫妻','子女','財帛','疾厄','遷移','交友','官祿','田宅','福德','父母'];
  document.getElementById('palaceList').innerHTML = [...data.palaces]
    .sort((a,b) => ORDER.indexOf(a.name)-ORDER.indexOf(b.name))
    .map(p => {
      let starsHTML;
      if (p.isEmpty) {
        starsHTML = `<span style="color:var(--dim)">${t('borrowed_lbl')} ${p.borrowedFromPalace}：${p.borrowedStars?.join('、')}</span>`;
      } else {
        starsHTML = p.majorStars.map(s => {
          const bri = s.brightness ? `<span class="${BRI_CLS[s.brightness]||''}" style="font-size:.75rem;margin-left:.2rem">${s.brightness}</span>` : '';
          const mut = s.yearMutagen ? ' '+badge(s.yearMutagen) : '';
          return `<span>${s.name}${bri}${mut}</span>`;
        }).join('　');
      }
      const bodyTag   = p.isBodyPalace     ? `<span class="pal-tag">${t('tag_body')}</span>`   : '';
      const origTag   = p.isOriginalPalace ? `<span class="pal-tag">${t('tag_origin')}</span>` : '';
      return `<div class="palace-row ${p.isBodyPalace?'has-body':''} ${p.isEmpty?'is-empty':''}">
        <span class="pal-name">${p.name}</span>
        <span class="pal-sb">${p.stemBranch}</span>
        <span class="pal-stars">${starsHTML}</span>
        ${bodyTag}${origTag}
      </div>`;
    }).join('');

  // Major limits
  const currentYear = new Date().getFullYear();
  document.getElementById('majorLimits').innerHTML = data.majorLimits.map(l => {
    const cur = currentYear >= l.startYear && currentYear <= l.endYear;
    return `<tr class="${cur?'current-limit':''}">
      <td>${t('limit_order', l.order)}</td>
      <td>${l.palace}</td>
      <td>${l.stem}</td>
      <td>${l.startYear}–${l.endYear}</td>
      <td>${l.startAge}–${l.endAge}</td>
    </tr>`;
  }).join('');
}

// ── Form submit ───────────────────────────────────────────────
let lastData = null, lastName = '';

document.getElementById('chartForm').addEventListener('submit', async e => {
  e.preventDefault();
  const date   = document.getElementById('date').value;
  const time   = document.getElementById('time').value;
  const gender = document.querySelector('input[name="gender"]:checked').value;
  const name   = document.getElementById('name').value.trim();

  const loading  = document.getElementById('loading');
  const errorBox = document.getElementById('errorBox');
  const result   = document.getElementById('result');
  const btn      = document.getElementById('submitBtn');

  errorBox.style.display = 'none';
  result.style.display   = 'none';
  loading.style.display  = 'block';
  btn.disabled = true;

  try {
    const res  = await fetch(`/api/chart?date=${date}&time=${time}&gender=${encodeURIComponent(gender)}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    lastData = data; lastName = name;
    renderAll(data, name);
    result.style.display = 'block';
    result.scrollIntoView({ behavior:'smooth', block:'start' });
  } catch(err) {
    errorBox.textContent = (lang==='zh'?'起盤失敗：':'Error: ') + err.message;
    errorBox.style.display = 'block';
  } finally {
    loading.style.display = 'none';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
