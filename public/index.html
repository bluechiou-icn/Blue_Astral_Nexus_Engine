<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÆTHNOUS · Astral Nexus Engine</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d1a;
    color: #e8dcc8;
    font-family: "PingFang TC", "Microsoft JhengHei", "Heiti TC", sans-serif;
    min-height: 100vh;
    padding: 40px 16px 80px;
  }

  /* ── 頂部品牌 ── */
  .brand { text-align: center; margin-bottom: 40px; }
  .brand-title {
    font-size: clamp(22px, 5vw, 36px);
    letter-spacing: 0.35em;
    color: #d4af37;
    font-weight: 300;
    margin-bottom: 6px;
    white-space: nowrap;
  }
  @media (max-width: 420px) {
    .brand-title { letter-spacing: 0.12em; }
  }
  .brand-sub {
    font-size: 12px;
    letter-spacing: 0.2em;
    color: #7a6a4a;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* ── 語言切換 ── */
  .lang-bar { display: flex; justify-content: center; gap: 8px; }
  .lang-btn {
    position: relative;
    border: 1px solid #3a3a5a;
    border-radius: 20px;
    color: #5a5a7a;
    padding: 4px 14px;
    font-size: 11px;
    cursor: pointer;
    background: transparent;
    font-family: inherit;
    letter-spacing: 0.05em;
    transition: border-color 0.2s, color 0.2s;
  }
  .lang-btn.active  { border-color: #d4af37; color: #d4af37; }
  .lang-btn[disabled] { opacity: 0.35; cursor: not-allowed; }
  .lang-btn[disabled]::after {
    content: 'Coming soon';
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    color: #ccc;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s;
  }
  .lang-btn[disabled]:hover::after { opacity: 1; }

  /* ── 卡片 ── */
  .card {
    background: rgba(19, 19, 42, 0.88);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid #2a2550;
    border-radius: 4px;
    padding: 28px 24px;
    max-width: 620px;
    margin: 0 auto 24px;
  }
  .card-title {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: #7a6a4a;
    text-transform: uppercase;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid #1e1e3a;
  }

  /* ── 表單 ── */
  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 12px;
    color: #9a8a6a;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .field input, .field select {
    width: 100%;
    background: #0d0d1a;
    border: 1px solid #2a2550;
    color: #e8dcc8;
    padding: 10px 12px;
    font-size: 14px;
    border-radius: 2px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus { border-color: #d4af37; }
  .field input::placeholder { color: #3a3a5a; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
  .radio-group label {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: #c8b890; cursor: pointer;
    padding: 7px 12px; border: 1px solid #2a2550; border-radius: 2px;
    transition: border-color 0.2s; margin-bottom: 0; letter-spacing: 0;
  }
  .radio-group input[type=radio] { width: auto; accent-color: #d4af37; }
  .radio-group label:has(input:checked) { border-color: #d4af37; color: #d4af37; }

  .optional { font-size: 10px; color: #4a4a6a; margin-left: 6px; letter-spacing: 0; }
  .mode-note { font-size: 11px; color: #6a5a3a; margin-top: 6px; line-height: 1.5; }

  .btn-submit {
    width: 100%; padding: 13px;
    background: transparent; border: 1px solid #d4af37;
    color: #d4af37; font-size: 13px; letter-spacing: 0.3em;
    cursor: pointer; border-radius: 2px; margin-top: 6px;
    transition: background 0.2s, color 0.2s; font-family: inherit;
  }
  .btn-submit:hover { background: #d4af37; color: #0d0d1a; }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Loading ── */
  .loading { text-align: center; padding: 40px; display: none; }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid #2a2550; border-top-color: #d4af37;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 結果區 ── */
  #result { display: none; }

  .mode-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 2px;
    font-size: 11px; letter-spacing: 0.15em; margin-bottom: 20px;
  }
  .mode-badge.analysis { background: rgba(212,175,55,0.1); border: 1px solid #d4af37; color: #d4af37; }
  .mode-badge.preview  { background: rgba(80,80,120,0.2);  border: 1px solid #3a3a6a;  color: #7a7aaa; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .info-item { background: #0d0d1a; border: 1px solid #1e1e3a; padding: 10px 14px; border-radius: 2px; }
  .info-label { font-size: 10px; color: #6a5a3a; letter-spacing: 0.15em; margin-bottom: 4px; }
  .info-value { font-size: 15px; color: #e8dcc8; }
  .info-value.gold { color: #d4af37; }

  .rectification-notice {
    background: rgba(180,100,50,0.1); border: 1px solid #6a3a1a;
    border-radius: 2px; padding: 10px 14px;
    font-size: 12px; color: #c08050; margin-bottom: 16px;
  }

  .section-title {
    font-size: 10px; letter-spacing: 0.25em; color: #7a6a4a;
    text-transform: uppercase; margin: 20px 0 10px;
    padding-bottom: 8px; border-bottom: 1px solid #1e1e3a;
  }

  .mutagen-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid #1a1a2e; font-size: 13px; }
  .mutagen-row:last-child { border-bottom: none; }
  .mutagen-type { width: 44px; font-size: 11px; padding: 2px 6px; border-radius: 2px; text-align: center; flex-shrink: 0; }
  .t-luk  { background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid #1a5a30; }
  .t-kuen { background: rgba(251,191,36,0.15);  color: #fbbf24; border: 1px solid #5a4a10; }
  .t-sci  { background: rgba(147,197,253,0.15); color: #93c5fd; border: 1px solid #1a3a5a; }
  .t-chi  { background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid #5a1a1a; }
  .mutagen-star { color: #e8dcc8; font-weight: 500; }
  .mutagen-palace { color: #9a8a6a; font-size: 12px; }
  .mutagen-arrow { color: #3a3a5a; }

  .palace-item { display: grid; grid-template-columns: 90px 1fr; gap: 10px; padding: 9px 0; border-bottom: 1px solid #1a1a2e; align-items: start; font-size: 13px; }
  .palace-item:last-child { border-bottom: none; }
  .palace-name { color: #c8a860; font-size: 12px; }
  .palace-sb { font-size: 10px; color: #4a4a6a; margin-top: 2px; }
  .palace-badge { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 1px; margin-left: 4px; vertical-align: middle; }
  .badge-body     { border: 1px solid #f59e0b; color: #f59e0b; }
  .badge-original { border: 1px solid #60a5fa; color: #60a5fa; }
  .palace-stars { color: #e8dcc8; line-height: 1.7; }
  .star-bright { font-size: 10px; color: #5a7a9a; margin-left: 2px; }
  .star-empty { color: #3a3a5a; font-style: italic; font-size: 12px; }
  .borrowed-note { font-size: 11px; color: #6a5a3a; margin-top: 2px; }

  .limit-row { display: grid; grid-template-columns: 26px 70px 80px 1fr; gap: 8px; align-items: center; padding: 7px 0; border-bottom: 1px solid #1a1a2e; font-size: 12px; }
  .limit-row:last-child { border-bottom: none; }
  .limit-row.current { background: rgba(212,175,55,0.05); padding: 7px 8px; border-radius: 2px; border: 1px solid rgba(212,175,55,0.2); margin: 4px -8px; }
  .limit-order { color: #4a4a6a; text-align: center; }
  .limit-palace { color: #c8a860; }
  .limit-years { color: #7a6a4a; }
  .limit-range { color: #6a5a3a; }
  .current-marker { font-size: 9px; color: #d4af37; letter-spacing: 0.1em; margin-left: 4px; }

  .preview-cta { text-align: center; padding: 20px; border: 1px dashed #2a2550; border-radius: 2px; margin-top: 20px; }
  .preview-cta p { font-size: 12px; color: #6a5a3a; line-height: 1.8; }

  /* Generate visualization CTA — leads to chart.aethnous.co */
  .vis-cta { text-align: center; padding: 24px 20px; margin-top: 20px; border: 1px solid rgba(155, 89, 255, 0.25); border-radius: 2px; background: linear-gradient(180deg, rgba(155, 89, 255, 0.06), rgba(212, 175, 55, 0.03)); }
  .vis-cta .vis-title { font-size: 11px; letter-spacing: 0.32em; color: #9b8aff; text-transform: uppercase; margin-bottom: 6px; }
  .vis-cta .vis-sub { font-size: 12px; color: #6a5a8a; line-height: 1.7; margin-bottom: 16px; }
  .vis-cta .vis-btn { display: inline-block; padding: 12px 28px; background: transparent; border: 1px solid #9b59ff; border-radius: 999px; color: #c8a8ff; font-family: inherit; font-size: 13px; letter-spacing: 0.28em; text-transform: uppercase; cursor: pointer; transition: all 0.4s ease; text-decoration: none; }
  .vis-cta .vis-btn:hover { background: rgba(155, 89, 255, 0.12); color: #e8d4ff; box-shadow: 0 0 30px rgba(155, 89, 255, 0.3); }

  .error-box { background: rgba(180,50,50,0.1); border: 1px solid #5a1a1a; border-radius: 2px; padding: 14px; color: #f87171; font-size: 13px; display: none; }

  /* ── Responsive (tablet / phone) ─────────────────────────── */
  @media (max-width: 768px) {
    body { padding: 24px 12px 60px; }
    .card { padding: 22px 16px; }
    .row-2 { grid-template-columns: 1fr; gap: 12px; }
    .info-grid { grid-template-columns: 1fr 1fr; }
    .palace-item { grid-template-columns: 76px 1fr; gap: 8px; }
    .limit-row {
      grid-template-columns: 22px 56px 70px 1fr;
      gap: 6px; font-size: 11px;
    }
    .field input, .field select { font-size: 16px; padding: 11px 12px; } /* 16px 防 iOS Safari 自動縮放 */
  }
  @media (max-width: 480px) {
    body { padding: 18px 10px 50px; }
    .brand { margin-bottom: 28px; }
    .brand-sub { font-size: 10px; letter-spacing: 0.15em; }
    .card { padding: 18px 12px; }
    .info-grid { grid-template-columns: 1fr; gap: 8px; }
    .palace-item { grid-template-columns: 1fr; gap: 4px; }
    .mutagen-row { font-size: 12px; gap: 8px; }
    .limit-row { grid-template-columns: 20px 50px 64px 1fr; font-size: 10.5px; }
    .lang-btn { padding: 4px 10px; font-size: 10px; }
  }

  /* ── Nebula Background ── */
  #nebula-bg {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    width: 100%; height: 100%;
    z-index: 0;
    overflow: hidden;
    background: #000;
    cursor: grab;
  }
  #nebula-bg.dragging { cursor: grabbing; }
  #nebula-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
  }
  body > div { position: relative; z-index: 1; }
</style>
</head>

<body>
<div id="nebula-bg">
  <canvas id="nebula-canvas"></canvas>
</div>

<div style="text-align:center;margin-bottom:16px;">
  <a href="https://www.aethnous.co/" style="display:inline-flex;align-items:center;gap:8px;padding:8px 22px;border:1px solid #2a2550;border-radius:999px;color:#7a6a9a;font-size:11px;letter-spacing:0.22em;text-decoration:none;text-transform:uppercase;font-family:inherit;transition:border-color 0.2s,color 0.2s;" onmouseover="this.style.borderColor='#9b59ff';this.style.color='#c8a8ff';" onmouseout="this.style.borderColor='#2a2550';this.style.color='#7a6a9a';">← Back to the Universe</a>
</div>

<div class="brand">
  <div class="brand-title">Æ &thinsp; T &thinsp; H &thinsp; N &thinsp; O &thinsp; U &thinsp; S</div>
  <div class="brand-sub">Astral Nexus Engine · Internal Research Tool</div>
  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('zh')">中文</button>
    <button class="lang-btn"        onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('ko')">한국어</button>
  </div>
</div>

<div class="card" id="form-card">
  <div class="card-title" data-i18n="form_title">命主資料</div>

  <div class="field">
    <label data-i18n="name_label">命主姓名 <span class="optional" data-i18n="optional">選填</span></label>
    <input type="text" id="f-name" data-i18n-ph="name_ph">
  </div>

  <div class="row-2">
    <div class="field">
      <label data-i18n="date_label">西曆生日</label>
      <input type="date" id="f-date" required>
    </div>
    <div class="field">
      <label data-i18n="time_label">出生時間</label>
      <input type="time" id="f-time" required>
    </div>
  </div>

  <div class="field">
    <label data-i18n="gender_label">性別</label>
    <div class="radio-group">
      <label><input type="radio" name="gender" value="男" checked> <span data-i18n="male">男</span></label>
      <label><input type="radio" name="gender" value="女"> <span data-i18n="female">女</span></label>
    </div>
  </div>

  <div class="field">
    <label data-i18n="city_label">出生城市 <span class="optional" data-i18n="optional">選填</span></label>
    <input type="text" id="f-city" value="台灣" data-i18n-ph="city_ph"
      onfocus="if(this.value.trim()==='台灣')this.value='';"
      onblur="if(this.value.trim()==='')this.value='台灣';">
  </div>

  <div class="field">
    <label data-i18n="timecert_label">出生時間確定度</label>
    <select id="f-timecert">
      <option value="certain"  data-i18n="tc_certain">確定（出生記錄、戶籍等）</option>
      <option value="approx"   data-i18n="tc_approx">大約（±30分鐘以內）</option>
      <option value="unknown"  data-i18n="tc_unknown">不清楚（需定盤）</option>
    </select>
  </div>

  <div class="field">
    <label data-i18n="relation_label">目前關係狀態 <span class="optional" data-i18n="optional">選填</span></label>
    <div class="radio-group">
      <label><input type="radio" name="relation" value="single">      <span data-i18n="rel_single">單身</span></label>
      <label><input type="radio" name="relation" value="dating">      <span data-i18n="rel_dating">交往中</span></label>
      <label><input type="radio" name="relation" value="married">     <span data-i18n="rel_married">已婚</span></label>
      <label><input type="radio" name="relation" value="divorced">    <span data-i18n="rel_divorced">離異</span></label>
      <label><input type="radio" name="relation" value="widowed">     <span data-i18n="rel_widowed">喪偶</span></label>
      <label><input type="radio" name="relation" value="undisclosed"> <span data-i18n="rel_undisclosed">不透露</span></label>
    </div>
  </div>

  <div class="field">
    <label data-i18n="order_label">訂單編號 <span class="optional" data-i18n="optional">選填</span></label>
    <input type="text" id="f-order" data-i18n-ph="order_ph">
    <div class="mode-note" data-i18n="mode_note">填入訂單編號 → Analysis Mode（標記為正式分析案例）<br>未填 → Preview Mode（僅供參考，資料不進入系統）</div>
  </div>

  <div class="error-box" id="form-error"></div>

  <button class="btn-submit" onclick="submit()" data-i18n="btn_submit">起 盤</button>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div style="font-size:12px;color:#6a5a3a;letter-spacing:0.2em;" data-i18n="loading_text">命盤計算中</div>
</div>

<div id="result">
  <div class="card">
    <div id="mode-badge-container"></div>
    <div id="rectification-notice"></div>
    <div class="section-title" data-i18n="sec_info">命盤基本資訊</div>
    <div class="info-grid" id="basic-info"></div>
    <div class="section-title" data-i18n="sec_mutagens">生年四化</div>
    <div id="mutagens"></div>
    <div class="section-title" data-i18n="sec_palaces">十二宮位主星</div>
    <div id="palaces"></div>
    <div class="section-title" data-i18n="sec_limits">十年大限</div>
    <div id="limits"></div>
    <div id="flow-section" style="margin-top:8px;"></div>
    <div id="preview-cta"></div>
    <div id="chart-vis-cta"></div>
  </div>
</div>

    info_name:'Name', info_wuxing:'Five Elements', info_lunar:'Lunar Date', info_shichen:'Birth Hour',
    info_body:'Soul Palace', info_origin:'Origin Palace', info_city:'Birth City', info_relation:'Relationship',
    badge_body:'Soul', badge_origin:'Origin',
    rect_approx:'Birth time is approximate (±30 min). Rectification recommended before analysis.',

    vis_title:'Generate Dynamic Chart',
    vis_sub:'Enter the interactive visualization — your birth data will carry over.',

const PALACE_EN = {
  '命宮':'Life','父母':'Parents','福德':'Virtue','田宅':'Property',
  '官祿':'Career','交友':'Friends','遷移':'Travel','疾厄':'Health',
  '財帛':'Wealth','子女':'Children','夫妻':'Spouse','兄弟':'Siblings',
};
const PALACE_KO = {
  '命宮':'명궁','父母':'부모','福德':'복덕','田宅':'전택',
  '官祿':'관록','交友':'교우','遷移':'천이','疾厄':'질액',
  '財帛':'재백','子女':'자녀','夫妻':'부처','兄弟':'형제',
};
const MUTAGEN_EN = { '化祿':'Fortune','化權':'Power','化科':'Merit','化忌':'Restrict' };
const MUTAGEN_KO = { '化祿':'화록','化權':'화권','化科':'화과','化忌':'화기' };
const BRI_EN = { '廟':'Dominant','旺':'Flourishing','得':'Comfortable','利':'Favorable','平':'Neutral','不利':'Unfavorable','陷':'Fallen','不':'Depleted' };
const BRI_KO = { '廟':'묘','旺':'왕','得':'득','利':'이','平':'평','不利':'불리','陷':'함','不':'불' };

// HTML escape — 防止 user-supplied 欄位 (name / city) 在 innerHTML 注入時觸發 XSS
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[ch]));
}
function t(key)        { return I18N[lang]?.[key] ?? I18N['zh'][key] ?? key; }
function palName(zh)   { if (lang==='en') return PALACE_EN[zh]??zh; if (lang==='ko') return PALACE_KO[zh]??zh; return zh; }
function muLabel(m)    { if (lang==='en') return MUTAGEN_EN[m]??m;  if (lang==='ko') return MUTAGEN_KO[m]??m;  return m; }
function briLabel(b)   { if (lang==='en') return BRI_EN[b]??b;      if (lang==='ko') return BRI_KO[b]??b;      return b; }

function applyStaticI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = t(el.dataset.i18n);
    if (v !== undefined) el.innerHTML = v;
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const v = t(el.dataset.i18nPh);
    if (v) el.placeholder = v;
  });
  // select options
  document.querySelectorAll('select option[data-i18n]').forEach(opt => {
    const v = t(opt.dataset.i18n);
    if (v) opt.textContent = v;
  });
  // lang-btn active state
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.onclick?.toString().includes(`'${lang}'`));
  });
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn:not([disabled])').forEach(b => {
    b.classList.toggle('active', b.onclick?.toString().includes(`'${l}'`));
  });
  applyStaticI18n();
  if (lastData) renderResult(lastData);
}

// ── 狀態 ─────────────────────────────────────────────────────
let clientData = {};
let lastData   = null;

// ── 提交 ─────────────────────────────────────────────────────
async function submit() {
  const date     = document.getElementById('f-date').value;
  const time     = document.getElementById('f-time').value;
  const gender   = document.querySelector('input[name=gender]:checked')?.value;
  const name     = document.getElementById('f-name').value.trim();
  const city     = document.getElementById('f-city').value.trim();
  const timecert = document.getElementById('f-timecert').value;
  const relation = document.querySelector('input[name=relation]:checked')?.value || 'undisclosed';
  const order    = document.getElementById('f-order').value.trim();
  const errBox   = document.getElementById('form-error');

  errBox.style.display = 'none';
  if (!date || !time || !gender) {
    errBox.textContent = lang === 'en' ? 'Please fill in date, time and gender.' : '請填寫生日、時間和性別。';
    errBox.style.display = 'block';
    return;
  }

  clientData = { name, city, timecert, relation, order };
  // 儲存目前命主的核心參數，供流年切換按鈕使用
  _currentChartParams = { date, time, gender, city };
  _currentFlowYear    = new Date().getFullYear();
  document.getElementById('form-card').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').style.display = 'none';

  try {
    const cityQS = city ? '&city=' + encodeURIComponent(city) : '';
    const res  = await fetch(`/api/chart?date=${date}&time=${time}&gender=${encodeURIComponent(gender)}${cityQS}`);
    if (!res.ok) throw new Error(`API error: ${res.status}`);
    lastData = await res.json();
    renderResult(lastData);
    // 自動載入本年流年分析
    loadFlowYear(date, time, gender, _currentFlowYear, city);
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('form-card').style.display = 'block';
    errBox.textContent = (lang === 'en' ? 'Chart calculation failed. ' : '命盤計算失敗，請稍後再試。（') + e.message + (lang === 'en' ? '' : '）');
    errBox.style.display = 'block';
  }
}

// ── 渲染結果 ─────────────────────────────────────────────────
function renderResult(d) {
  const isAnalysis = !!clientData.order;
  const needRect   = clientData.timecert !== 'certain';

  // Mode Badge
  document.getElementById('mode-badge-container').innerHTML = isAnalysis
    ? `<div class="mode-badge analysis">▸ ANALYSIS MODE &nbsp;·&nbsp; ${clientData.order}</div>`
    : `<div class="mode-badge preview">▸ PREVIEW MODE &nbsp;·&nbsp; ${lang === 'en' ? 'Reference only' : '僅供參考'}</div>`;

  // 真太陽時資訊（從 meta 取得）
  const trueSolarTime = d.meta?.trueSolarTime || null;
  const clockTime     = d.meta?.clockTime || null;
  const offsetMin     = d.meta?.trueSolarTimeOffsetMinutes;
  const crossedHour   = d.meta?.trueSolarTimeCrossedHour;
  const crossedWarning = d.meta?.trueSolarTimeCrossedHourWarning;

  // 真太陽時顯示：若與鐘錶時間不同，顯示偏差
  const solarTimeDisplay = (trueSolarTime && trueSolarTime !== clockTime)
    ? `${trueSolarTime} <span style="font-size:11px;color:#9a6a3a">（鐘錶${clockTime}，偏差${offsetMin >= 0 ? '+' : ''}${offsetMin}分）</span>`
    : (trueSolarTime || '—');

  // 定盤警示
  const rectEl = document.getElementById('rectification-notice');
  rectEl.innerHTML = needRect
    ? `<div class="rectification-notice">⚠ ${t(clientData.timecert === 'approx' ? 'rect_approx' : 'rect_unknown')}</div>`
    : '';

  // 跨時辰警示（比定盤警示更高優先，前置顯示）
  if (crossedHour && crossedWarning) {
    const existingRect = rectEl.innerHTML;
    rectEl.innerHTML = `<div class="rectification-notice" style="border-color:#8a4a1a;color:#e08040;">
      ${crossedWarning}
    </div>` + existingRect;
  }

  // 基本資訊
  const relKey = 'rel_' + (clientData.relation || 'undisclosed');
  document.getElementById('basic-info').innerHTML = `
    <div class="info-item"><div class="info-label">${t('info_name')}</div><div class="info-value">${escapeHtml(clientData.name) || (lang==='en'?'(not filled)':'（未填）')}</div></div>
    <div class="info-item"><div class="info-label">${t('info_wuxing')}</div><div class="info-value gold">${escapeHtml(d.fiveElementsClass)}</div></div>
    <div class="info-item"><div class="info-label">${t('info_lunar')}</div><div class="info-value">${escapeHtml(d.lunarDate)}</div></div>
    <div class="info-item"><div class="info-label">${t('info_shichen')}</div><div class="info-value">${escapeHtml(d.shichen)}</div></div>
    <div class="info-item"><div class="info-label">${t('info_body')}</div><div class="info-value">${escapeHtml(palName(d.bodyPalace?.name ?? '—'))}（${escapeHtml(d.bodyPalace?.stemBranch ?? '')}）</div></div>
    <div class="info-item"><div class="info-label">${t('info_origin')}</div><div class="info-value">${escapeHtml(palName(d.originalPalace?.name ?? '—'))}（${escapeHtml(d.originalPalace?.stemBranch ?? '')}）</div></div>
    <div class="info-item"><div class="info-label">${t('info_city')}</div><div class="info-value">${escapeHtml(clientData.city) || '—'}</div></div>
    <div class="info-item"><div class="info-label">真太陽時</div><div class="info-value">${solarTimeDisplay}</div></div>
    <div class="info-item"><div class="info-label">${t('info_relation')}</div><div class="info-value">${t(relKey)}</div></div>
  `;

  // 生年四化
  const typeClass = { '化祿':'t-luk','化權':'t-kuen','化科':'t-sci','化忌':'t-chi' };
  document.getElementById('mutagens').innerHTML = (d.yearMutagens||[]).map(m => `
    <div class="mutagen-row">
      <span class="mutagen-type ${typeClass[m.type]||''}">${muLabel(m.type)}</span>
      <span class="mutagen-star">${m.star}</span>
      <span class="mutagen-arrow">→</span>
      <span class="mutagen-palace">${palName(m.palace ?? m.targetPalace ?? '—')}</span>
    </div>`).join('');

  // 十二宮位
  document.getElementById('palaces').innerHTML = (d.palaces||[]).map(p => {
    const badges = [
      p.isBodyPalace     ? `<span class="palace-badge badge-body">${t('badge_body')}</span>` : '',
      p.isOriginalPalace ? `<span class="palace-badge badge-original">${t('badge_origin')}</span>` : '',
    ].join('');

    let starsHtml;
    if (p.majorStars?.length > 0) {
      starsHtml = p.majorStars.map(s => {
        const bright = s.brightness ? `<span class="star-bright">${briLabel(s.brightness)}</span>` : '';
        const mut    = s.yearMutagen ? ` <span class="mutagen-type ${typeClass[s.yearMutagen]||''}" style="font-size:9px;padding:1px 4px;">${muLabel(s.yearMutagen).replace('化','').replace('Fortune','祿').replace('Power','權').replace('Merit','科').replace('Restrict','忌')}</span>` : '';
        return `${s.name}${bright}${mut}`;
      }).join('　');
    } else if (p.isEmpty && p.borrowedFromPalace) {
      starsHtml = `<span class="star-empty">${t('empty_palace')}</span>
        <div class="borrowed-note">${t('borrowed_prefix')}${palName(p.borrowedFromPalace)}：${(p.borrowedStars||[]).join('、')}</div>`;
    } else {
      starsHtml = `<span class="star-empty">${t('no_star')}</span>`;
    }

    return `
      <div class="palace-item">
        <div>
          <div class="palace-name">${palName(p.name)}${badges}</div>
          <div class="palace-sb">${p.stemBranch}</div>
        </div>
        <div class="palace-stars">${starsHtml}</div>
      </div>`;
  }).join('');

  // 大限
  const nowYear = new Date().getFullYear();
  document.getElementById('limits').innerHTML = (d.majorLimits||[]).map(l => {
    const isCur  = nowYear >= l.startYear && nowYear <= l.endYear;
    const marker = isCur ? `<span class="current-marker">${t('now_marker')}</span>` : '';
    return `
      <div class="${isCur ? 'limit-row current' : 'limit-row'}">
        <div class="limit-order">${l.order}</div>
        <div class="limit-palace">${palName(l.palace)}${marker}</div>
        <div class="limit-years">${l.startAge}–${l.endAge} ${t('age_suffix')}</div>
        <div class="limit-range">${l.startYear}–${l.endYear}</div>
      </div>`;
  }).join('');

  // Preview CTA
  document.getElementById('preview-cta').innerHTML = !isAnalysis
    ? `<div class="preview-cta"><p>${t('preview_p1')}<br>${t('preview_p2')}</p></div>`
    : '';

  // Generate Visualization CTA → chart.aethnous.co with URL params
  if (_currentChartParams) {
    const p = _currentChartParams;
    const qs = new URLSearchParams({
      date: p.date, time: p.time, gender: p.gender,
      ...(p.city ? { city: p.city } : {}),
    }).toString();
    const visUrl = 'https://chart.aethnous.co/chart.html?' + qs;
    document.getElementById('chart-vis-cta').innerHTML = `
      <div class="vis-cta">
        <div class="vis-title">✦ ${t('vis_title')} ✦</div>
        <div class="vis-sub">${t('vis_sub')}</div>
        <a class="vis-btn" href="${visUrl}" rel="noopener">${t('vis_btn')} →</a>
      </div>`;
  }

  // Analysis Mode：附加真太陽時技術註記
  if (isAnalysis && d.meta?.trueSolarTimeNote) {
    const existingNote = document.getElementById('true-solar-tech-note');
    if (existingNote) existingNote.remove();
    const techNote = document.createElement('div');
    techNote.id = 'true-solar-tech-note';
    techNote.style.cssText = 'font-size:10px;color:#4a4a6a;margin-top:16px;padding:8px 12px;border:1px solid #1e1e3a;border-radius:2px;';
    techNote.textContent = '真太陽時：' + d.meta.trueSolarTimeNote;
    document.getElementById('result').querySelector('.card').appendChild(techNote);
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('result').style.display = 'block';
}

// ════════════════════════════════════════════════════════
// 流年分析 (Phase 2)
// ════════════════════════════════════════════════════════
let _currentFlowYear    = new Date().getFullYear();
let _currentChartParams = {};

async function loadFlowYear(date, time, gender, year, city) {
  const flowSection = document.getElementById('flow-section');
  if (!flowSection) return;

  flowSection.innerHTML = `
    <div class="section-title">流年分析 · ${year}</div>
    <div style="text-align:center;padding:20px;color:#6a5a3a;font-size:12px;">
      <div class="spinner" style="margin:0 auto 10px;"></div>流年資料計算中
    </div>`;

  try {
    const cityParam = city ? `&city=${encodeURIComponent(city)}` : '';
    const res = await fetch(`/api/flow?date=${date}&time=${time}&gender=${encodeURIComponent(gender)}&year=${year}${cityParam}&_t=${Date.now()}`);
    const f = await res.json();
    renderFlowYear(f, year, flowSection);
  } catch(e) {
    flowSection.innerHTML = `<div class="section-title">流年分析</div>
      <div style="color:#f87171;font-size:12px;padding:10px;">流年資料載入失敗</div>`;
  }
}

function renderFlowYear(f, year, container) {
  const typeClass = { '化祿':'t-luk','化權':'t-kuen','化科':'t-sci','化忌':'t-chi' };

  const fy  = f.flowYear;
  const ml  = f.currentMajorLimit;
  const flp = f.flowYearLifePalace || f.minorLimitPalace;

  // 祿忌交戰摘要（含 severity 樣式）
  const conflicts = f.luJiConflicts || [];
  const conflictHtml = conflicts.length > 0
    ? conflicts.map(c => `
        <div class="mutagen-row" style="border-left:2px solid ${c.severity==='critical'?'#f87171':c.severity==='high'?'#fbbf24':'#6a6a9a'};padding-left:8px;">
          <span class="mutagen-type t-chi" style="font-size:10px;">${c.severity}</span>
          <span class="mutagen-star">${c.star}</span>
          <span class="mutagen-palace">在${c.palace}</span>
          <span style="font-size:11px;color:#9a6a6a;">${c.note}</span>
        </div>`).join('')
    : '<div style="font-size:12px;color:#4a4a6a;padding:6px 0;">本年無祿忌交戰</div>';

  // 三干疊加
  const ts = f.tripleStemOverlap;
  const tsColor = ts?.isTripleOverlap ? '#f87171' : ts?.isDoubleOverlap ? '#fbbf24' : '#4a4a6a';
  const tsText = ts?.note || '—';

  container.innerHTML = `
    <div class="section-title">流年分析 · ${year}</div>

    <div class="info-grid" style="margin-bottom:16px;">
      <div class="info-item">
        <div class="info-label">流年干支</div>
        <div class="info-value gold">${fy?.ganZhi || '—'}</div>
      </div>
      <div class="info-item">
        <div class="info-label">虛歲</div>
        <div class="info-value">${fy?.chineseAge || '—'} 歲</div>
      </div>
      <div class="info-item">
        <div class="info-label">小限宮位</div>
        <div class="info-value">${flp ? flp.name + '（' + flp.stemBranch + '）' : '—'}
          ${flp?.isBodyPalace ? '<span class="palace-badge badge-body">身</span>' : ''}
          ${flp?.isOriginalPalace ? '<span class="palace-badge badge-original">來</span>' : ''}
        </div>
      </div>
      <div class="info-item">
        <div class="info-label">當前大限</div>
        <div class="info-value">${ml ? ml.palace + '（' + ml.startYear + '–' + ml.endYear + '）' : '—'}</div>
      </div>
    </div>

    <div class="section-title" style="margin-top:0;">流年四化</div>
    <div style="margin-bottom:16px;">
      ${(f.flowYearMutagens || []).map(m => `
        <div class="mutagen-row">
          <span class="mutagen-type ${typeClass[m.type] || ''}">${m.type}</span>
          <span class="mutagen-star">${m.star || '—'}</span>
          <span class="mutagen-arrow">→</span>
          <span class="mutagen-palace">${m.targetPalace || '—'}</span>
        </div>`).join('')}
    </div>

    <div class="section-title" style="margin-top:0;">干支疊加</div>
    <div style="font-size:12px;color:${tsColor};padding:8px 0;margin-bottom:12px;line-height:1.6;">
      ${tsText}
    </div>

    <div class="section-title" style="margin-top:0;">祿忌交戰</div>
    <div style="margin-bottom:8px;">${conflictHtml}</div>

    <div style="text-align:right;margin-top:8px;">
      <button onclick="changeFlowYear(-1)" style="background:transparent;border:1px solid #2a2550;color:#9a8a6a;padding:4px 10px;font-size:11px;cursor:pointer;border-radius:2px;margin-right:6px;">◀ ${year-1}</button>
      <button onclick="changeFlowYear(1)" style="background:transparent;border:1px solid #2a2550;color:#9a8a6a;padding:4px 10px;font-size:11px;cursor:pointer;border-radius:2px;">${year+1} ▶</button>
    </div>`;
}

function changeFlowYear(delta) {
  _currentFlowYear += delta;
  const { date, time, gender, city } = _currentChartParams;
  if (date) loadFlowYear(date, time, gender, _currentFlowYear, city);
}

// 初始化靜態 i18n
applyStaticI18n();
</script>

<script>
// ── Nebula background (WebGL, 5 presets, native resolution) ───
(function () {
  var nebBg  = document.getElementById('nebula-bg');
  var canvas = document.getElementById('nebula-canvas');
  var gl     = canvas && (canvas.getContext('webgl') || canvas.getContext('experimental-webgl'));
  if (!gl) { if (nebBg) nebBg.style.background = '#0d0d1a'; return; }

  // Per-page randomization
  var PRESET      = Math.floor(Math.random() * 5);
  var RNG         = Math.random();
  var DRIFT_ANGLE = Math.random() * Math.PI * 2;

  var VS = 'attribute vec2 a_pos;\nvoid main(){gl_Position=vec4(a_pos,0.0,1.0);}';

  var FS = [
    'precision highp float;',
    'uniform vec2  u_res;',
    'uniform float u_time;',
    'uniform vec2  u_pan;',
    'uniform int   u_preset;',
    'uniform float u_rng;',

    'float hash(vec2 p){p=fract(p*vec2(127.1,311.7));p+=dot(p,p+74.351);return fract(p.x*p.y);}',

    'float vn(vec2 p){',
    '  vec2 i=floor(p);vec2 f=fract(p);vec2 u=f*f*(3.0-2.0*f);',
    '  return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),',
    '             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);}',

    'float fbm(vec2 p){',
    '  float v=0.0,a=0.5;mat2 rot=mat2(1.6,1.2,-1.2,1.6);',
    '  for(int i=0;i<6;i++){v+=a*vn(p);p=rot*p;a*=0.5;}return v;}',

    'vec3 stars(vec2 uv){',
    '  vec3 col=vec3(0.0);',
    // small dense field
    '  vec2 g=floor(uv*260.0+u_rng*73.1);',
    '  vec2 lo=fract(uv*260.0+u_rng*73.1)-0.5;',
    '  float h=hash(g+u_rng*19.3);',
    '  float sz=0.05+0.07*hash(g+7.1);',
    '  float tw=0.75+0.25*sin(u_time*(2.0+h*5.0)+h*83.0);',
    '  col+=step(0.963,h)*tw*smoothstep(sz,0.0,length(lo))*vec3(0.85+0.15*h,0.9,1.0);',
    // bright sparse stars with glow
    '  g=floor(uv*75.0+u_rng*131.7);',
    '  lo=fract(uv*75.0+u_rng*131.7)-0.5;',
    '  h=hash(g+u_rng*43.7+99.9);sz=0.04+0.05*h;',
    '  tw=0.8+0.2*sin(u_time*(1.5+h*3.5)+h*61.0);',
    '  float vis=step(0.94,h);',
    '  col+=(vis*smoothstep(sz,0.0,length(lo))+exp(-length(lo)*24.0)*vis*0.28)',
    '       *tw*(1.0+0.8*h)*vec3(0.9,0.92,1.0);',
    '  return col;}',

    'void main(){',
    '  vec2 uv=(gl_FragCoord.xy-0.5*u_res)/min(u_res.x,u_res.y);',
    '  uv+=u_pan;',
    // two-level domain-warped FBM for cloud structure
    '  vec2 q=vec2(fbm(uv*1.3),fbm(uv*1.3+vec2(5.2,1.3)));',
    '  vec2 r=vec2(fbm(uv*1.2+4.0*q+vec2(1.7,9.2)+0.018*u_time),',
    '              fbm(uv*1.2+4.0*q+vec2(8.3,2.8)+0.014*u_time));',
    '  float f=fbm(uv+4.0*r);',
    // high-freq filament layer
    '  float f2=fbm(uv*2.8+vec2(3.7,1.9)+0.012*u_time',
    '              +2.0*vec2(fbm(uv*2.8),fbm(uv*2.8+vec2(2.1,4.3))));',

    // Preset palettes — 5 visually distinct nebula styles
    '  vec3 nbg=vec3(0.0),c1=vec3(0.0),c2=vec3(0.0),c3=vec3(0.0);',
    '  float dens=0.0,fils=0.0;',
    '  if(u_preset==0){',        // Hubble blue + orange pillars
    '    nbg=vec3(0.01,0.01,0.06);c1=vec3(0.05,0.25,0.72);',
    '    c2=vec3(0.10,0.52,0.90);c3=vec3(0.92,0.38,0.06);dens=0.68;fils=0.52;',
    '  }else if(u_preset==1){', // warm golden / Eta Carinae
    '    nbg=vec3(0.04,0.02,0.01);c1=vec3(0.36,0.17,0.04);',
    '    c2=vec3(0.82,0.54,0.12);c3=vec3(1.00,0.88,0.42);dens=0.72;fils=0.38;',
    '  }else if(u_preset==2){', // dark starfield / Milky Way core
    '    nbg=vec3(0.00,0.00,0.02);c1=vec3(0.05,0.07,0.15);',
    '    c2=vec3(0.22,0.28,0.44);c3=vec3(0.55,0.52,0.38);dens=0.28;fils=0.18;',
    '  }else if(u_preset==3){', // blue filamentary / Veil Nebula
    '    nbg=vec3(0.00,0.00,0.03);c1=vec3(0.00,0.14,0.44);',
    '    c2=vec3(0.04,0.52,0.88);c3=vec3(0.38,0.85,1.00);dens=0.48;fils=0.88;',
    '  }else{',                  // purple / violet cosmic
    '    nbg=vec3(0.02,0.01,0.05);c1=vec3(0.18,0.05,0.32);',
    '    c2=vec3(0.48,0.10,0.68);c3=vec3(0.88,0.38,1.00);dens=0.62;fils=0.50;',
    '  }',

    // random hue shift across all presets
    '  float hs=(u_rng-0.5)*0.18;',
    '  c1+=vec3(hs,hs*0.4,-hs*0.6);',
    '  c2+=vec3(hs,hs*0.4,-hs*0.6);',
    '  c3+=vec3(hs*0.5,hs*0.2,-hs);',

    // dark absorption lanes
    '  float absorp=smoothstep(0.44,0.70,fbm(uv*2.8+vec2(9.1,3.4)));',
    '  float cloud=pow(clamp(f,0.0,1.0),1.8)*dens*(1.0-absorp*0.65);',

    // color gradient: bg → mid → bright
    '  vec3 col=nbg;',
    '  col=mix(col,c1,cloud);',
    '  col=mix(col,c2,cloud*cloud);',
    // emission hot spots
    '  float hot=pow(clamp(f*1.35-0.22,0.0,1.0),2.2);',
    '  col=mix(col,c3,hot*0.55);',
    // filament overlay
    '  float fil=pow(clamp(f2*1.5-0.42,0.0,1.0),2.0)*fils;',
    '  col+=fil*c3*0.38;',
    // stars
    '  col+=stars(uv);',
    // Reinhard tone-map + gamma
    '  col=col/(col+0.42);',
    '  col=pow(max(col,0.0),vec3(0.88));',
    '  gl_FragColor=vec4(col,1.0);}',
  ].join('\n');

  function compileShader(type, src) {
    var sh = gl.createShader(type);
    gl.shaderSource(sh, src); gl.compileShader(sh);
    if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
      console.error('Nebula shader error:', gl.getShaderInfoLog(sh)); return null;
    }
    return sh;
  }
  var vs = compileShader(gl.VERTEX_SHADER, VS);
  var fs = compileShader(gl.FRAGMENT_SHADER, FS);
  if (!vs || !fs) { nebBg.style.background = '#0d0d1a'; return; }

  var prog = gl.createProgram();
  gl.attachShader(prog, vs); gl.attachShader(prog, fs);
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    console.error('Nebula link error:', gl.getProgramInfoLog(prog));
    nebBg.style.background = '#0d0d1a'; return;
  }
  gl.useProgram(prog);

  var quadBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  var aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  var uRes    = gl.getUniformLocation(prog, 'u_res');
  var uTime   = gl.getUniformLocation(prog, 'u_time');
  var uPan    = gl.getUniformLocation(prog, 'u_pan');
  var uPreset = gl.getUniformLocation(prog, 'u_preset');
  var uRng    = gl.getUniformLocation(prog, 'u_rng');
  gl.uniform1i(uPreset, PRESET);
  gl.uniform1f(uRng, RNG);

  function resize() {
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width  = Math.floor(window.innerWidth  * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize);
  resize();

  // ── Pan state (UV-space) ──────────────────────────────────
  var tx=0, ty=0, vx=0, vy=0;
  var dragging=false, lastX=0, lastY=0, autoT=0;

  function clampPan() {
    tx = Math.max(-0.5, Math.min(0.5, tx));
    ty = Math.max(-0.5, Math.min(0.5, ty));
  }

  nebBg.addEventListener('mousedown', function(e) {
    dragging=true; lastX=e.clientX; lastY=e.clientY; vx=0; vy=0;
    nebBg.classList.add('dragging'); e.preventDefault();
  });
  window.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var minD = Math.min(window.innerWidth, window.innerHeight);
    vx = -(e.clientX - lastX) / minD;
    vy =  (e.clientY - lastY) / minD;
    tx += vx; ty += vy;
    lastX = e.clientX; lastY = e.clientY;
    clampPan();
  });
  window.addEventListener('mouseup', function() { dragging=false; nebBg.classList.remove('dragging'); });
  nebBg.addEventListener('touchstart', function(e) {
    dragging=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY; vx=0; vy=0;
  }, { passive: true });
  window.addEventListener('touchmove', function(e) {
    if (!dragging) return;
    var minD = Math.min(window.innerWidth, window.innerHeight);
    vx = -(e.touches[0].clientX - lastX) / minD;
    vy =  (e.touches[0].clientY - lastY) / minD;
    tx += vx; ty += vy;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    clampPan();
  }, { passive: true });
  window.addEventListener('touchend', function() { dragging=false; });

  // ── Render loop ───────────────────────────────────────────
  var t0 = performance.now();
  (function frame() {
    var t = (performance.now() - t0) * 0.001;
    if (!dragging) { vx *= 0.92; vy *= 0.92; tx += vx; ty += vy; }
    autoT += 0.00022;
    clampPan();
    // ambient oscillation in the random drift direction
    var driftX = Math.sin(DRIFT_ANGLE) * Math.sin(autoT * 0.80) * 0.040
               + Math.cos(DRIFT_ANGLE) * Math.cos(autoT * 0.55) * 0.025;
    var driftY = Math.cos(DRIFT_ANGLE) * Math.sin(autoT * 0.65) * 0.035
               + Math.sin(DRIFT_ANGLE) * Math.cos(autoT * 0.40) * 0.020;
    gl.uniform2f(uRes,  canvas.width, canvas.height);
    gl.uniform1f(uTime, t);
    gl.uniform2f(uPan,  tx + driftX, ty + driftY);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(frame);
  })();
})();
</script>
</body>
</html>
