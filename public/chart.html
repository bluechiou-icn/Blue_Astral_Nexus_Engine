<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÆTHNOUS · 命盤圖</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d0d1a;
  color: #e8dcc8;
  font-family: "PingFang TC", "Microsoft JhengHei", "Heiti TC", sans-serif;
  min-height: 100vh;
  padding: 20px 16px 60px;
}
.brand { text-align: center; margin-bottom: 20px; }
.brand-title {
  font-size: clamp(16px, 4vw, 26px);
  letter-spacing: 0.3em;
  color: #d4af37;
  font-weight: 300;
  margin-bottom: 4px;
  white-space: nowrap;
}
.brand-sub { font-size: 10px; letter-spacing: 0.2em; color: #7a6a4a; text-transform: uppercase; }
.back-link {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; letter-spacing: 0.1em; color: #4a4a6a;
  text-decoration: none; margin-bottom: 16px;
  transition: color 0.2s;
}
.back-link:hover { color: #d4af37; }
.panel {
  background: #13132a; border: 1px solid #2a2550;
  border-radius: 4px; padding: 18px;
  max-width: 680px; margin: 0 auto 16px;
}
.panel-title {
  font-size: 10px; letter-spacing: 0.25em; color: #7a6a4a;
  text-transform: uppercase; margin-bottom: 14px;
  padding-bottom: 8px; border-bottom: 1px solid #1e1e3a;
}
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; color: #9a8a6a; letter-spacing: 0.08em; margin-bottom: 4px; }
.field input {
  width: 100%; background: #0d0d1a; border: 1px solid #2a2550;
  color: #e8dcc8; padding: 8px 10px; font-size: 14px;
  border-radius: 2px; outline: none; font-family: inherit;
  transition: border-color 0.2s;
}
.field input:focus { border-color: #d4af37; }
.field input::placeholder { color: #2a2a4a; }
.row-3 { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; }
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.radio-grp { display: flex; gap: 8px; padding-top: 2px; }
.radio-grp label {
  display: flex; align-items: center; gap: 5px;
  font-size: 13px; color: #c8b890; cursor: pointer;
  padding: 6px 12px; border: 1px solid #2a2550; border-radius: 2px;
  transition: border-color 0.2s; white-space: nowrap;
}
.radio-grp input[type=radio] { width: auto; accent-color: #d4af37; }
.radio-grp label:has(input:checked) { border-color: #d4af37; color: #d4af37; }
.btn-primary {
  width: 100%; padding: 11px; background: transparent;
  border: 1px solid #d4af37; color: #d4af37;
  font-size: 12px; letter-spacing: 0.3em; cursor: pointer;
  border-radius: 2px; margin-top: 4px; transition: background 0.2s, color 0.2s;
  font-family: inherit;
}
.btn-primary:hover { background: #d4af37; color: #0d0d1a; }
.err-box {
  background: rgba(180,50,50,0.1); border: 1px solid #5a1a1a;
  border-radius: 2px; padding: 9px 12px; color: #f87171;
  font-size: 12px; display: none; margin-top: 8px;
}
.loading { text-align: center; padding: 40px; display: none; }
.spinner {
  width: 28px; height: 28px; border: 2px solid #2a2550;
  border-top-color: #d4af37; border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

#chart-area { display: none; max-width: 900px; margin: 0 auto; }
.meta-bar {
  background: #13132a; border: 1px solid #2a2550; border-radius: 4px;
  padding: 10px 14px; margin-bottom: 10px;
  display: flex; flex-wrap: wrap; gap: 6px 12px; align-items: center;
  font-size: 11px;
}
.mi { display: flex; gap: 4px; }
.ml { color: #4a3a1a; letter-spacing: 0.1em; }
.mv { color: #c8a860; }
.msep { color: #2a2550; }
.flow-bar {
  background: #13132a; border: 1px solid #2a2550; border-radius: 4px;
  padding: 9px 14px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.fy-year { font-size: 20px; font-weight: 300; color: #d4af37; letter-spacing: 0.08em; }
.fy-gz   { font-size: 12px; color: #9a8a6a; }
.fy-age  { font-size: 11px; color: #7a6a4a; }
.flow-btn {
  background: transparent; border: 1px solid #3a3a5a; color: #7a7a9a;
  padding: 5px 12px; border-radius: 2px; cursor: pointer;
  font-size: 12px; font-family: inherit; transition: border-color 0.2s, color 0.2s;
}
.flow-btn:hover { border-color: #d4af37; color: #d4af37; }
.fy-limit { font-size: 11px; color: #5a4a2a; margin-left: auto; }
.canvas-wrap { display: flex; justify-content: center; margin-bottom: 10px; overflow-x: auto; }
canvas { display: block; border-radius: 2px; }
.actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.actions button {
  background: transparent; border: 1px solid #3a3a5a; color: #7a7a9a;
  padding: 7px 14px; border-radius: 2px; cursor: pointer;
  font-size: 11px; letter-spacing: 0.12em; font-family: inherit;
  transition: border-color 0.2s, color 0.2s;
}
.actions button:hover { border-color: #d4af37; color: #d4af37; }
.chart-note { font-size: 10px; color: #2a2a3a; text-align: center; letter-spacing: 0.1em; }
</style>
</head>
<body>

<div class="brand">
  <div class="brand-title">Æ&thinsp;T&thinsp;H&thinsp;N&thinsp;O&thinsp;U&thinsp;S</div>
  <div class="brand-sub">Astral Nexus Engine · Chart View</div>
</div>
<div style="max-width:900px;margin:0 auto 10px;">
  <a href="/" class="back-link">← 返回首頁</a>
</div>

<div class="panel" id="input-panel">
  <div class="panel-title">命主資料</div>
  <div class="row-3">
    <div class="field"><label>西曆生日</label><input type="date" id="f-date"></div>
    <div class="field"><label>出生時間</label><input type="time" id="f-time"></div>
    <div class="field">
      <label>性別</label>
      <div class="radio-grp">
        <label><input type="radio" name="g" value="男" checked> 男</label>
        <label><input type="radio" name="g" value="女"> 女</label>
      </div>
    </div>
  </div>
  <div class="row-2">
    <div class="field">
      <label>流年（西元，留空=本年）</label>
      <input type="number" id="f-year" placeholder="e.g. 2026" min="1900" max="2100">
    </div>
    <div class="field">
      <label>命主姓名（選填）</label>
      <input type="text" id="f-name" placeholder="姓名或代稱">
    </div>
  </div>
  <div class="err-box" id="form-err"></div>
  <button class="btn-primary" onclick="handleSubmit()">起　盤</button>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div style="font-size:11px;color:#6a5a3a;letter-spacing:0.2em;">命盤計算中</div>
</div>

<div id="chart-area">
  <div class="meta-bar" id="meta-bar"></div>
  <div class="flow-bar">
    <span style="font-size:10px;letter-spacing:0.15em;color:#5a4a2a;">流年</span>
    <span class="fy-year" id="fc-year">—</span>
    <span class="fy-gz" id="fc-gz"></span>
    <span class="fy-age" id="fc-age"></span>
    <button class="flow-btn" onclick="changeYear(-1)">← 上一年</button>
    <button class="flow-btn" onclick="changeYear(+1)">下一年 →</button>
    <span class="fy-limit" id="fc-limit"></span>
  </div>
  <div class="canvas-wrap">
    <canvas id="chart-canvas"></canvas>
  </div>
  <div class="actions">
    <button onclick="exportPNG()">匯出 PNG</button>
    <button onclick="resetChart()">重新輸入</button>
  </div>
  <div class="chart-note">ÆTHNOUS Astral Nexus Engine · Blue's Version · © 2026 Blue.X</div>
</div>

<script>
// ════════════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════════════

const PAL_SEQ = ['命宮','兄弟','夫妻','子女','財帛','疾厄','遷移','交友','官祿','田宅','福德','父母'];

const BRANCH_POS = {
  '巳':[0,0],'午':[0,1],'未':[0,2],'申':[0,3],
  '辰':[1,0],                        '酉':[1,3],
  '卯':[2,0],                        '戌':[2,3],
  '寅':[3,0],'丑':[3,1],'子':[3,2],'亥':[3,3],
};

// Mutagen type info (fg = text color for non-badge use, bg = badge bg, key = one-char)
const MU = {
  '化祿':{ fg:'#4ade80', bg:'#16a34a', key:'祿' },
  '化權':{ fg:'#fbbf24', bg:'#ca8a04', key:'權' },
  '化科':{ fg:'#93c5fd', bg:'#2563eb', key:'科' },
  '化忌':{ fg:'#f87171', bg:'#dc2626', key:'忌' },
};

// Brightness colors (star text + brightness text)
const BRIGHT_CLR = {
  '廟':'#f8d57e', '旺':'#f0b429',
  '得':'#e5a000', '利':'#c4870a',
  '平':'#8a7250',
  '不利':'#6b5a3e',
  '陷':'#4a3f2d',
  '不':'#3a302a',
};

const AUXILIARY_STARS = new Set(['左輔','右弼','文昌','文曲','天魁','天鉞','祿存','天馬']);
const KILLING_STARS   = new Set(['擎羊','陀羅','火星','鈴星','地空','地劫']);

const CELL = 210;
const BASE = 840;
const PAD  = 7;
const DPR  = window.devicePixelRatio || 1;
const FONT = '"PingFang TC","Microsoft JhengHei","Heiti TC",sans-serif';
const BOTTOM_RESERVE = 38; // px from cell bottom reserved for palace name + decade

// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
const S = {
  chartData: null,
  flowData:  null,
  birthDate: '',
  birthTime: '',
  gender:    '',
  name:      '',
  currentYear: new Date().getFullYear(),
};

// ════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════

function palOffset(natalName, refMingName) {
  const i = PAL_SEQ.indexOf(natalName);
  const j = PAL_SEQ.indexOf(refMingName);
  if (i < 0 || j < 0) return null;
  return PAL_SEQ[(i - j + 12) % 12];
}

function buildMuMap(yearM, decadeM, flowM) {
  const map = {};
  const add = (arr, src) => {
    for (const m of arr || []) {
      const pal = m.palace ?? m.targetPalace;
      if (!pal) continue;
      (map[pal] = map[pal] || []).push({ type: m.type, star: m.star, src });
    }
  };
  add(yearM,   'year');
  add(decadeM, 'decade');
  add(flowM,   'flow');
  return map;
}

function ts() {
  return new Date().toISOString().replace(/\D/g,'').slice(0,8);
}

// ════════════════════════════════════════════════════════
// CANVAS HELPERS
// ════════════════════════════════════════════════════════

function setupCanvas(canvas) {
  canvas.width  = BASE * DPR;
  canvas.height = BASE * DPR;
  const disp = Math.min(BASE, window.innerWidth - 32);
  canvas.style.width  = disp + 'px';
  canvas.style.height = disp + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);
  return ctx;
}

// Draw a colored badge with white text; returns next x position
function drawBadge(ctx, text, bg, x, y, fs) {
  fs = fs || 8;
  ctx.save();
  ctx.font = `bold ${fs}px ${FONT}`;
  const tw = ctx.measureText(text).width;
  const bw = tw + 3, bh = fs + 2;
  ctx.fillStyle = bg;
  ctx.fillRect(x, y - fs - 1, bw, bh);
  ctx.fillStyle = '#ffffff';
  ctx.fillText(text, x + 1.5, y);
  ctx.restore();
  return x + bw + 2;
}

// ════════════════════════════════════════════════════════
// CANVAS: GRID
// ════════════════════════════════════════════════════════

function drawGrid(ctx) {
  ctx.fillStyle = '#090912';
  ctx.fillRect(0, 0, BASE, BASE);
  ctx.strokeStyle = '#252545';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,BASE); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(BASE,i*CELL); ctx.stroke();
  }
  ctx.fillStyle = '#0f0f22';
  ctx.fillRect(CELL, CELL, 2*CELL, 2*CELL);
  ctx.strokeStyle = '#30305a'; ctx.lineWidth = 1.5;
  ctx.strokeRect(CELL+0.75, CELL+0.75, 2*CELL-1.5, 2*CELL-1.5);
}

// ════════════════════════════════════════════════════════
// CANVAS: PALACE CELL
// ════════════════════════════════════════════════════════

function drawPalace(ctx, palace, row, col, opts) {
  const { muMap, decadeMing, flowMing, minorLimPalace,
          origPalace, bodyPalace, birthYear } = opts;
  const cx = col * CELL, cy = row * CELL;
  const hasFlow = !!(flowMing);
  const isHot   = hasFlow && palace.name === minorLimPalace; // 流限同宮

  // ── Background ──────────────────────────────────────────
  ctx.fillStyle = '#090912';
  ctx.fillRect(cx+1, cy+1, CELL-2, CELL-2);

  // ── 流限同宮：金色雙線邊框 ────────────────────────────────
  if (isHot) {
    ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 2;
    ctx.strokeRect(cx+2, cy+2, CELL-4, CELL-4);
    ctx.strokeStyle = '#8a6822'; ctx.lineWidth = 1;
    ctx.strokeRect(cx+5, cy+5, CELL-10, CELL-10);
  }

  // ── Corner markers (top-right stacked) ───────────────────
  let markerY = cy + 10;
  ctx.textAlign = 'right';
  ctx.font = `bold 8px ${FONT}`;
  if (palace.name === origPalace) {
    ctx.fillStyle='#3b82f6'; ctx.fillText('來', cx+CELL-PAD, markerY); markerY += 10;
  }
  if (palace.name === bodyPalace) {
    ctx.fillStyle='#f59e0b'; ctx.fillText('身', cx+CELL-PAD, markerY); markerY += 10;
  }
  if (hasFlow && palace.name === minorLimPalace) {
    ctx.fillStyle='#ef4444'; ctx.fillText('限', cx+CELL-PAD, markerY);
  }
  ctx.textAlign = 'left';

  // ── Top-left: 流限同宮 label + 流年/大限 palace names ─────
  let nameY = cy + 8;

  if (isHot) {
    ctx.font = `bold 8px ${FONT}`; ctx.fillStyle = '#d4af37';
    ctx.fillText('★ 流限同宮', cx + PAD, nameY + 8); nameY += 11;
  }
  if (hasFlow && flowMing) {
    const fp = palOffset(palace.name, flowMing);
    if (fp) {
      ctx.font = `bold 13px ${FONT}`; ctx.fillStyle = '#d4af37';
      ctx.fillText('流' + fp.charAt(0), cx + PAD, nameY + 12); nameY += 14;
    }
  }
  if (hasFlow && decadeMing) {
    const dp = palOffset(palace.name, decadeMing);
    if (dp) {
      ctx.font = `10px ${FONT}`; ctx.fillStyle = '#8a6828';
      ctx.fillText('大' + dp.charAt(0), cx + PAD, nameY + 10); nameY += 12;
    }
  }

  // ── Stars area start ─────────────────────────────────────
  const starsTop = Math.max(nameY + 3, cy + (hasFlow ? 50 : 12));
  let sy = starsTop;
  const palMu = muMap[palace.name] || [];
  const bottomLimit = cy + CELL - BOTTOM_RESERVE;

  // Helper: draw ONE star line (major star style)
  const drawStarLine = (name, brightness, fontSize) => {
    if (sy > bottomLimit) return;
    const bc = BRIGHT_CLR[brightness] || '#5a5060';

    ctx.font = `${fontSize}px ${FONT}`;
    ctx.fillStyle = '#c0b8a8';
    ctx.fillText(name, cx + PAD, sy);
    let sx = cx + PAD + name.length * fontSize * 0.85 + 1;

    if (brightness) {
      ctx.font = `${fontSize - 1}px ${FONT}`;
      ctx.fillStyle = bc;
      ctx.fillText(brightness, sx, sy);
      sx += brightness.length * (fontSize - 1) * 0.85 + 2;
    }

    // Inline mutagen badges
    const starMu = palMu.filter(m => m.star === name);
    for (const mu of starMu) {
      if (sx > cx + CELL - 14) break;
      const info = MU[mu.type]; if (!info) continue;
      const prefix = mu.src === 'year' ? '生' : mu.src === 'decade' ? '大' : '流';
      sx = drawBadge(ctx, prefix + info.key, info.bg, sx, sy, 8);
    }
    sy += fontSize + 2;
  };

  // Layer 1: Major stars
  if (palace.isEmpty && palace.borrowedFromPalace) {
    if (sy <= bottomLimit) {
      ctx.font = `9px ${FONT}`; ctx.fillStyle = '#252545';
      ctx.fillText('空 借' + palace.borrowedFromPalace.charAt(0) + '：' +
        (palace.borrowedStars || []).join(''), cx + PAD, sy + 8);
      sy += 12;
    }
  } else {
    for (const star of palace.majorStars || []) {
      drawStarLine(star.name, star.brightness, 12);
    }
  }

  // Layer 2: Auxiliary stars (compact, colored by brightness)
  const auxSt = (palace.minorStars || []).filter(s => AUXILIARY_STARS.has(s.name));
  if (auxSt.length > 0 && sy <= bottomLimit) {
    let ax = cx + PAD, ay = sy;
    let row2 = 0;
    const afs = 9;
    ctx.font = `${afs}px ${FONT}`;
    for (const st of auxSt) {
      const abbr = st.name.charAt(0) + (st.brightness || '');
      const aw = ctx.measureText(abbr).width + 3;
      if (ax + aw > cx + CELL - PAD) {
        if (row2 >= 1) break;
        ay += afs + 2; ax = cx + PAD; row2++;
      }
      ctx.fillStyle = BRIGHT_CLR[st.brightness] || '#35355a';
      ctx.fillText(abbr, ax, ay + afs);
      ax += aw;

      // tiny badges for minor stars
      const sMu = palMu.filter(m => m.star === st.name);
      for (const mu of sMu) {
        if (ax > cx + CELL - 12) break;
        const info = MU[mu.type]; if (!info) continue;
        const pfx = mu.src === 'year' ? '生' : mu.src === 'decade' ? '大' : '流';
        ax = drawBadge(ctx, pfx + info.key, info.bg, ax, ay + afs, 7);
      }
    }
    sy = ay + afs + 4;
  }

  // Layer 3: Killing stars (compact, reddish tone)
  const killSt = (palace.minorStars || []).filter(s => KILLING_STARS.has(s.name));
  if (killSt.length > 0 && sy <= bottomLimit) {
    let kx = cx + PAD;
    const kfs = 9;
    ctx.font = `${kfs}px ${FONT}`;
    for (const st of killSt) {
      if (kx > cx + CELL - PAD) break;
      const abbr = st.name.charAt(0) + (st.brightness?.charAt(0) || '');
      ctx.fillStyle = BRIGHT_CLR[st.brightness] || '#5a3535';
      ctx.fillText(abbr, kx, sy + kfs);
      kx += abbr.length * kfs * 0.85 + 4;
    }
    sy += kfs + 4;
  }

  // Layer 4: Small/misc stars (very dim, first chars only)
  const otherMin = (palace.minorStars || []).filter(
    s => !AUXILIARY_STARS.has(s.name) && !KILLING_STARS.has(s.name)
  );
  const smSt = [...otherMin, ...(palace.smallStars || [])];
  if (smSt.length > 0 && sy <= bottomLimit) {
    const text = smSt.map(s => s.name.charAt(0)).join(' ');
    ctx.font = `8px ${FONT}`; ctx.fillStyle = '#242435';
    ctx.fillText(text, cx + PAD, sy + 8);
  }

  // ── Bottom: Palace name (centered, bold, white) ────────────
  // Center horizontally, leave right space for stem/branch
  const palNameX = cx + (CELL - 16) / 2;
  ctx.font = `bold 13px ${FONT}`; ctx.fillStyle = '#ddd0b8';
  ctx.textAlign = 'center';
  ctx.fillText(palace.name, palNameX, cy + CELL - 16);
  ctx.textAlign = 'left';

  // ── Bottom: Decade years (西元年 format) ──────────────────
  if (palace.decadeRange && birthYear) {
    const sy0 = birthYear + palace.decadeRange[0];
    const ey0 = birthYear + palace.decadeRange[1];
    ctx.font = `8px ${FONT}`; ctx.fillStyle = '#1c1c36';
    ctx.fillText(`${sy0}~${ey0}`, cx + PAD, cy + CELL - 5);
  }

  // ── Bottom-right: Stem ↑ Branch ↓ (vertically stacked) ───
  ctx.font = `9px ${FONT}`; ctx.fillStyle = '#2e2e52';
  ctx.textAlign = 'right';
  ctx.fillText(palace.stem,   cx + CELL - PAD, cy + CELL - 22);
  ctx.fillText(palace.branch, cx + CELL - PAD, cy + CELL - 10);
  ctx.textAlign = 'left';
}

// ════════════════════════════════════════════════════════
// CANVAS: CENTER 2×2
// ════════════════════════════════════════════════════════

function drawCenter(ctx) {
  const d  = S.chartData, fd = S.flowData;
  const cx = CELL, cy = CELL, cw = 2*CELL, ch = 2*CELL;
  const mx = cx + cw/2;

  ctx.fillStyle = '#0f0f22';
  ctx.fillRect(cx, cy, cw, ch);
  ctx.textAlign = 'center';

  // Brand
  ctx.font = `300 17px ${FONT}`; ctx.fillStyle = '#d4af37';
  ctx.fillText('ÆTHNOUS', mx, cy + 26);
  ctx.strokeStyle = '#252540'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx+24, cy+33); ctx.lineTo(cx+cw-24, cy+33); ctx.stroke();

  if (!d) { ctx.textAlign='left'; return; }

  let iy = cy + 50;
  const lh = 17;

  // Name
  if (S.name) {
    ctx.font = `bold 15px ${FONT}`; ctx.fillStyle = '#e8dcc8';
    ctx.fillText(S.name, mx, iy); iy += 20;
  }

  ctx.font = `10px ${FONT}`; ctx.fillStyle = '#8a7a5a';
  ctx.fillText(`${S.birthDate}　${S.birthTime}　${S.gender}`, mx, iy); iy += lh;

  ctx.fillStyle = '#5a4a30';
  ctx.fillText(d.lunarDate, mx, iy); iy += lh;

  ctx.font = `bold 13px ${FONT}`; ctx.fillStyle = '#c8a830';
  ctx.fillText(`${d.fiveElementsClass}　·　${d.yinYang}`, mx, iy); iy += lh + 2;

  ctx.font = `9px ${FONT}`; ctx.fillStyle = '#5a4a30';
  ctx.fillText(`命主：${d.lifeStars?.mingZhu||'—'}　身主：${d.lifeStars?.shenZhu||'—'}`, mx, iy); iy += lh - 2;

  ctx.fillText(`時辰：${d.shichen||'—'}`, mx, iy); iy += lh - 2;

  const bStr = d.bodyPalace ? '身宮：' + d.bodyPalace.name : '';
  const oStr = d.originalPalace ? '來因：' + d.originalPalace.name : '';
  ctx.fillText([bStr, oStr].filter(Boolean).join('　'), mx, iy); iy += lh;

  ctx.strokeStyle = '#1e1e3a'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx+28, iy+2); ctx.lineTo(cx+cw-28, iy+2); ctx.stroke();
  iy += 10;

  // Flow year section
  if (fd) {
    const fy = fd.flowYear, ml = fd.currentMajorLimit;

    ctx.font = `bold 22px ${FONT}`; ctx.fillStyle = '#d4af37';
    ctx.fillText(`${fy.year}　${fy.ganZhi}年`, mx, iy); iy += 26;

    ctx.font = `10px ${FONT}`; ctx.fillStyle = '#8a7a5a';
    ctx.fillText(`虛齡 ${fy.chineseAge} 歲`, mx, iy); iy += lh;

    if (ml) {
      ctx.fillStyle = '#5a4a28';
      ctx.fillText(`大限：${ml.palace}宮　${ml.startYear}~${ml.endYear}`, mx, iy); iy += lh;
    }
  }

  ctx.font = `8px ${FONT}`; ctx.fillStyle = '#181830';
  ctx.fillText('© 2026 Blue.X  ·  ÆTHNOUS', mx, cy + ch - 9);
  ctx.textAlign = 'left';
}

// ════════════════════════════════════════════════════════
// CANVAS: MAIN RENDER
// ════════════════════════════════════════════════════════

function renderChart() {
  const canvas = document.getElementById('chart-canvas');
  const ctx = setupCanvas(canvas);
  const d = S.chartData, fd = S.flowData;
  if (!d) return;

  const muMap      = buildMuMap(d.yearMutagens, fd?.currentMajorLimit?.mutagens, fd?.flowYearMutagens);
  const decadeMing = fd?.currentMajorLimit?.palace   || null;
  const flowMing   = fd?.flowYearLifePalace?.name    || null;
  const minorLimPalace = flowMing;
  const origPalace = d.originalPalace?.name          || null;
  const bodyPalace = d.bodyPalace?.name              || null;
  const birthYear  = parseInt(S.birthDate.split('-')[0]);

  drawGrid(ctx);

  for (const palace of d.palaces) {
    const pos = BRANCH_POS[palace.branch];
    if (!pos) continue;
    drawPalace(ctx, palace, pos[0], pos[1], {
      muMap, decadeMing, flowMing, minorLimPalace,
      origPalace, bodyPalace, birthYear,
    });
  }

  drawCenter(ctx);
}

// ════════════════════════════════════════════════════════
// API
// ════════════════════════════════════════════════════════

async function apiChart(date, time, gender) {
  const r = await fetch(`/api/chart?date=${encodeURIComponent(date)}&time=${encodeURIComponent(time)}&gender=${encodeURIComponent(gender)}&_t=${ts()}`);
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || 'HTTP ' + r.status);
  return j;
}

async function apiFlow(date, time, gender, year) {
  const r = await fetch(`/api/flow?date=${encodeURIComponent(date)}&time=${encodeURIComponent(time)}&gender=${encodeURIComponent(gender)}&year=${year}&_t=${ts()}`);
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || 'HTTP ' + r.status);
  return j;
}

// ════════════════════════════════════════════════════════
// UI
// ════════════════════════════════════════════════════════

function updateMetaBar() {
  const d = S.chartData; if (!d) return;
  const mingPal = d.palaces.find(p => p.name === '命宮');
  document.getElementById('meta-bar').innerHTML = [
    ['五行局', d.fiveElementsClass],
    ['陰陽',   d.yinYang],
    ['命宮',   mingPal?.stemBranch || '—'],
    ['身宮',   d.bodyPalace?.name  || '—'],
    ['來因宮', d.originalPalace?.name || '—'],
  ].map(([l,v]) => `<div class="mi"><span class="ml">${l}</span><span class="mv">${v}</span></div>`)
   .join('<span class="msep">·</span>');
}

function updateFlowBar() {
  const fd = S.flowData;
  document.getElementById('fc-year').textContent = S.currentYear;
  if (!fd) return;
  const fy = fd.flowYear, ml = fd.currentMajorLimit;
  document.getElementById('fc-gz').textContent  = fy.ganZhi + '年';
  document.getElementById('fc-age').textContent = `虛齡${fy.chineseAge}歲`;
  document.getElementById('fc-limit').textContent = ml
    ? `大限：${ml.palace}宮　${ml.startYear}~${ml.endYear}`
    : '';
}

// ════════════════════════════════════════════════════════
// HANDLERS
// ════════════════════════════════════════════════════════

async function handleSubmit() {
  const date   = document.getElementById('f-date').value;
  const time   = document.getElementById('f-time').value;
  const gender = document.querySelector('input[name=g]:checked')?.value;
  const name   = document.getElementById('f-name').value.trim();
  const yv     = document.getElementById('f-year').value.trim();
  const err    = document.getElementById('form-err');

  err.style.display = 'none';
  if (!date || !time || !gender) {
    err.textContent = '請填寫生日、時間和性別。';
    err.style.display = 'block'; return;
  }

  const year = yv ? parseInt(yv) : new Date().getFullYear();
  Object.assign(S, { birthDate:date, birthTime:time, gender, name, currentYear:year });

  document.getElementById('input-panel').style.display = 'none';
  document.getElementById('chart-area').style.display  = 'none';
  document.getElementById('loading').style.display     = 'block';

  try {
    const [chartData, flowData] = await Promise.all([
      apiChart(date, time, gender),
      apiFlow(date, time, gender, year),
    ]);
    S.chartData = chartData;
    S.flowData  = flowData;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('chart-area').style.display = 'block';
    updateMetaBar();
    updateFlowBar();
    renderChart();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('input-panel').style.display = 'block';
    err.textContent = '命盤計算失敗：' + e.message;
    err.style.display = 'block';
  }
}

async function changeYear(delta) {
  S.currentYear += delta;
  document.getElementById('fc-year').textContent = S.currentYear;
  document.getElementById('fc-gz').textContent   = '';
  document.getElementById('fc-age').textContent  = '';
  document.getElementById('fc-limit').textContent= '';
  try {
    S.flowData = await apiFlow(S.birthDate, S.birthTime, S.gender, S.currentYear);
    updateFlowBar();
    renderChart();
  } catch(e) { console.error('Flow error:', e); }
}

function exportPNG() {
  const canvas = document.getElementById('chart-canvas');
  const link = document.createElement('a');
  const n = S.name ? S.name + '_' : '';
  link.download = `AETHNOUS_${n}${S.birthDate}_${S.currentYear}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function resetChart() {
  S.chartData = null; S.flowData = null;
  document.getElementById('chart-area').style.display  = 'none';
  document.getElementById('input-panel').style.display = 'block';
}

window.addEventListener('resize', () => {
  if (S.chartData) renderChart();
});
</script>
