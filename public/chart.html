<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>命盤視覺化工具</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f2f1ed;
  color: #1a1a1a;
  font-family: "PingFang TC", "Microsoft JhengHei", "Heiti TC", sans-serif;
  min-height: 100vh;
  padding: 20px 16px 60px;
}
h1.page-title {
  text-align: center;
  font-size: 15px;
  font-weight: 400;
  letter-spacing: 0.3em;
  color: #555;
  margin-bottom: 20px;
}
.panel {
  background: #fff;
  border: 1px solid #d8d6d0;
  border-radius: 4px;
  padding: 18px;
  max-width: 720px;
  margin: 0 auto 16px;
}
.panel-title { font-size: 10px; letter-spacing: 0.2em; color: #888; text-transform: uppercase; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid #e8e6e0; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; color: #666; letter-spacing: 0.05em; margin-bottom: 4px; }
.field input {
  width: 100%; background: #fff; border: 1px solid #d0cec8;
  color: #1a1a1a; padding: 8px 10px; font-size: 14px;
  border-radius: 2px; outline: none; font-family: inherit;
  transition: border-color 0.15s;
}
.field input:focus { border-color: #888; }
.field input::placeholder { color: #bbb; }
.row-3 { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; }
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.radio-grp { display: flex; gap: 8px; padding-top: 2px; }
.radio-grp label {
  display: flex; align-items: center; gap: 5px;
  font-size: 13px; color: #333; cursor: pointer;
  padding: 6px 12px; border: 1px solid #d0cec8; border-radius: 2px;
  transition: border-color 0.15s; white-space: nowrap;
}
.radio-grp input[type=radio] { width: auto; accent-color: #333; }
.radio-grp label:has(input:checked) { border-color: #333; }
.btn-primary {
  width: 100%; padding: 10px; background: #1a1a1a;
  border: none; color: #fff; font-size: 12px;
  letter-spacing: 0.3em; cursor: pointer; border-radius: 2px;
  margin-top: 4px; transition: background 0.15s; font-family: inherit;
}
.btn-primary:hover { background: #333; }
.err-box { background: #fff0f0; border: 1px solid #f5c6c6; border-radius: 2px; padding: 9px 12px; color: #c0392b; font-size: 12px; display: none; margin-top: 8px; }
.loading { text-align: center; padding: 40px; display: none; }
.spinner { width: 24px; height: 24px; border: 2px solid #ddd; border-top-color: #555; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
@keyframes spin { to { transform: rotate(360deg); } }

#chart-area { display: none; max-width: 1060px; margin: 0 auto; }
.meta-bar {
  background: #fff; border: 1px solid #d8d6d0; border-radius: 4px;
  padding: 9px 14px; margin-bottom: 8px;
  display: flex; flex-wrap: wrap; gap: 6px 14px; align-items: center;
  font-size: 11px; color: #333;
}
.mi { display: flex; gap: 4px; }
.ml { color: #999; }
.mv { color: #1a1a1a; font-weight: 500; }
.msep { color: #ccc; }
.flow-bar {
  background: #fff; border: 1px solid #d8d6d0; border-radius: 4px;
  padding: 9px 14px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.fy-label { font-size: 10px; letter-spacing: 0.1em; color: #999; }
.fy-year { font-size: 22px; font-weight: 300; color: #1a1a1a; }
.fy-gz   { font-size: 13px; color: #555; }
.fy-age  { font-size: 11px; color: #888; }
.flow-btn {
  background: #fff; border: 1px solid #ccc; color: #333;
  padding: 5px 14px; border-radius: 2px; cursor: pointer;
  font-size: 12px; font-family: inherit; transition: background 0.15s;
}
.flow-btn:hover { background: #f5f4f0; }
.fy-limit { font-size: 11px; color: #888; margin-left: auto; }
.canvas-wrap { display: flex; justify-content: center; margin-bottom: 10px; overflow-x: auto; }
canvas { display: block; border-radius: 2px; box-shadow: 0 2px 12px rgba(0,0,0,0.12); }
.actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.actions button {
  background: #fff; border: 1px solid #ccc; color: #333;
  padding: 7px 14px; border-radius: 2px; cursor: pointer;
  font-size: 11px; letter-spacing: 0.05em; font-family: inherit;
  transition: background 0.15s;
}
.actions button:hover { background: #f5f4f0; }
</style>
</head>
<body>

<h1 class="page-title">命 盤 視 覺 化 工 具</h1>

<div class="panel" id="input-panel">
  <div class="panel-title">命主資料</div>
  <div class="row-3">
    <div class="field"><label>西曆生日</label><input type="date" id="f-date"></div>
    <div class="field"><label>出生時間</label><input type="time" id="f-time"></div>
    <div class="field">
      <label>性別</label>
      <div class="radio-grp">
        <label><input type="radio" name="g" value="男" checked> 男</label>
        <label><input type="radio" name="g" value="女"> 女</label>
      </div>
    </div>
  </div>
  <div class="row-2">
    <div class="field"><label>流年（西元，留空=本年）</label><input type="number" id="f-year" placeholder="e.g. 2026" min="1900" max="2100"></div>
    <div class="field"><label>命主姓名（選填）</label><input type="text" id="f-name" placeholder=""></div>
  </div>
  <div class="err-box" id="form-err"></div>
  <button class="btn-primary" onclick="handleSubmit()">起　盤</button>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div style="font-size:11px;color:#888;letter-spacing:0.15em;">命盤計算中</div>
</div>

<div id="chart-area">
  <div class="meta-bar" id="meta-bar"></div>
  <div class="flow-bar">
    <span class="fy-label">流年</span>
    <span class="fy-year" id="fc-year">—</span>
    <span class="fy-gz" id="fc-gz"></span>
    <span class="fy-age" id="fc-age"></span>
    <button class="flow-btn" onclick="changeYear(-1)">← 上一年</button>
    <button class="flow-btn" onclick="changeYear(+1)">下一年 →</button>
    <span class="fy-limit" id="fc-limit"></span>
  </div>
  <div class="canvas-wrap">
    <canvas id="chart-canvas"></canvas>
  </div>
  <div class="actions">
    <button onclick="exportPNG()">匯出命盤</button>
    <button onclick="resetChart()">重新輸入</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════════════

const PAL_SEQ = ['命宮','兄弟','夫妻','子女','財帛','疾厄','遷移','交友','官祿','田宅','福德','父母'];

const BRANCH_POS = {
  '巳':[0,0],'午':[0,1],'未':[0,2],'申':[0,3],
  '辰':[1,0],                        '酉':[1,3],
  '卯':[2,0],                        '戌':[2,3],
  '寅':[3,0],'丑':[3,1],'子':[3,2],'亥':[3,3],
};

// Mutagen colors for LIGHT theme
const MU_LIGHT = {
  '化祿': { solid:'#16a34a', light:'#f0fdf4', textL:'#166534', border:'#22c55e', key:'祿' },
  '化權': { solid:'#d97706', light:'#fffbeb', textL:'#92400e', border:'#f59e0b', key:'權' },
  '化科': { solid:'#2563eb', light:'#eff6ff', textL:'#1e3a8a', border:'#60a5fa', key:'科' },
  '化忌': { solid:'#dc2626', light:'#fef2f2', textL:'#991b1b', border:'#f87171', key:'忌' },
};

// Star category colors (light theme)
const CLR_MAJOR = '#1a1a1a';
const CLR_AUX   = '#1a4fa8';   // deep blue for 輔吉星
const CLR_KILL  = '#c0392b';   // red for 煞忌星
const CLR_SMALL = '#999999';   // gray for 小星

// Brightness colors for light bg
const BRIGHT_CLR = {
  '廟':'#d4960a', '旺':'#e07800',
  '得':'#666666', '利':'#777777',
  '平':'#999999',
  '不利':'#bbbbbb',
  '陷':'#cccccc',
  '不':'#dddddd',
};

// Star category membership
const AUX_STARS  = new Set(['左輔','右弼','文昌','文曲','天魁','天鉞','祿存','天馬']);
const KILL_STARS = new Set(['擎羊','陀羅','火星','鈴星','地空','地劫']);

// Canvas geometry
const CELL = 250;
const BASE = 1000;
const PAD  = 10;
const BOT  = 44;  // bottom reserve
const DPR  = window.devicePixelRatio || 1;
const FONT = '"PingFang TC","Microsoft JhengHei","Heiti TC",sans-serif';

// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
const S = {
  chartData: null, flowData: null,
  birthDate: '', birthTime: '', gender: '', name: '',
  currentYear: new Date().getFullYear(),
};

// ════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════

function palOffset(n, ref) {
  const i = PAL_SEQ.indexOf(n), j = PAL_SEQ.indexOf(ref);
  if (i < 0 || j < 0) return null;
  return PAL_SEQ[(i - j + 12) % 12];
}

function buildMuMap(yearM, decadeM, flowM) {
  const map = {};
  const add = (arr, src) => {
    for (const m of arr||[]) {
      const pal = m.palace ?? m.targetPalace; if (!pal) continue;
      (map[pal] = map[pal]||[]).push({ type: m.type, star: m.star, src });
    }
  };
  add(yearM,'year'); add(decadeM,'decade'); add(flowM,'flow');
  return map;
}

function ts() { return new Date().toISOString().replace(/\D/g,'').slice(0,8); }

// ════════════════════════════════════════════════════════
// CANVAS HELPERS
// ════════════════════════════════════════════════════════

function setupCanvas(canvas) {
  canvas.width  = BASE * DPR;
  canvas.height = BASE * DPR;
  const disp = Math.min(BASE, window.innerWidth - 32);
  canvas.style.width  = disp + 'px';
  canvas.style.height = disp + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);
  return ctx;
}

// Light-theme badge: 3 styles based on source
// year=outlined, decade=light-fill, flow=solid-fill
function badgeL(ctx, text, muType, src, x, y, fs) {
  fs = fs || 9;
  const mc = MU_LIGHT[muType]; if (!mc) return x;
  ctx.save();
  ctx.font = `bold ${fs}px ${FONT}`;
  const tw = ctx.measureText(text).width;
  const bw = tw + 4, bh = fs + 2;

  if (src === 'year') {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x, y-fs-1, bw, bh);
    ctx.strokeStyle = mc.border; ctx.lineWidth = 1;
    ctx.strokeRect(x+0.5, y-fs-0.5, bw-1, bh-1);
    ctx.fillStyle = mc.border;
    ctx.fillText(text, x+2, y);
  } else if (src === 'decade') {
    ctx.fillStyle = mc.light;
    ctx.fillRect(x, y-fs-1, bw, bh);
    ctx.strokeStyle = mc.border; ctx.lineWidth = 0.5;
    ctx.strokeRect(x+0.5, y-fs-0.5, bw-1, bh-1);
    ctx.fillStyle = mc.textL;
    ctx.fillText(text, x+2, y);
  } else {
    ctx.fillStyle = mc.solid;
    ctx.fillRect(x, y-fs-1, bw, bh);
    ctx.fillStyle = '#ffffff';
    ctx.fillText(text, x+2, y);
  }
  ctx.restore();
  return x + bw + 2;
}

// ════════════════════════════════════════════════════════
// GRID
// ════════════════════════════════════════════════════════

function drawGrid(ctx) {
  // White background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, BASE, BASE);

  // Outer border
  ctx.strokeStyle = '#b0aea8'; ctx.lineWidth = 1.5;
  ctx.strokeRect(0.75, 0.75, BASE-1.5, BASE-1.5);

  // Inner grid lines
  ctx.strokeStyle = '#cccccc'; ctx.lineWidth = 1;
  for (let i = 1; i < 4; i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,BASE); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(BASE,i*CELL); ctx.stroke();
  }

  // Center 2×2 slightly different background
  ctx.fillStyle = '#f9f8f4';
  ctx.fillRect(CELL, CELL, 2*CELL, 2*CELL);
  ctx.strokeStyle = '#b8b6b0'; ctx.lineWidth = 1;
  ctx.strokeRect(CELL+0.5, CELL+0.5, 2*CELL-1, 2*CELL-1);
}

// ════════════════════════════════════════════════════════
// PALACE CELL
// ════════════════════════════════════════════════════════

function drawPalace(ctx, palace, row, col, opts) {
  const { muMap, decadeMing, flowMing, minorLimPalace,
          origPalace, bodyPalace, birthYear } = opts;
  const cx = col * CELL, cy = row * CELL;
  const hasFlow = !!(flowMing);

  // Detect small limit (限 marker) and flow/limit coincidence
  const isMinorLim = hasFlow && palace.name === minorLimPalace;
  const isFlowLimSame = hasFlow && flowMing === minorLimPalace;
  const isHot = isMinorLim && isFlowLimSame; // true 流限同宮

  // ── Background (white) ────────────────────────────────
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(cx+1, cy+1, CELL-2, CELL-2);

  // ── 流限同宮 amber double border ──────────────────────
  if (isHot) {
    ctx.strokeStyle = '#d4960a'; ctx.lineWidth = 2;
    ctx.strokeRect(cx+2, cy+2, CELL-4, CELL-4);
    ctx.strokeStyle = '#f0c840'; ctx.lineWidth = 1;
    ctx.strokeRect(cx+5, cy+5, CELL-10, CELL-10);
  }

  // ── Corner markers (top-right) ────────────────────────
  let my = cy + 14;
  ctx.textAlign = 'right'; ctx.font = `bold 10px ${FONT}`;
  if (palace.name === origPalace)   { ctx.fillStyle='#2563eb'; ctx.fillText('來', cx+CELL-PAD, my); my+=13; }
  if (palace.name === bodyPalace)   { ctx.fillStyle='#d97706'; ctx.fillText('身', cx+CELL-PAD, my); my+=13; }
  if (isMinorLim)                   { ctx.fillStyle='#dc2626'; ctx.fillText('限', cx+CELL-PAD, my); }
  ctx.textAlign = 'left';

  // ── TOP-LEFT: Decade year range ───────────────────────
  let topY = cy + 13;
  if (palace.decadeRange && birthYear) {
    const sy0 = birthYear + palace.decadeRange[0];
    const ey0 = birthYear + palace.decadeRange[1];
    ctx.font = `9px ${FONT}`; ctx.fillStyle = '#bbbbbb';
    ctx.fillText(`${sy0}~${ey0}`, cx+PAD, topY);
    topY += 14;
  }

  // ── TOP-LEFT: Three-layer names 流X｜大X｜本命 ────────
  if (hasFlow) {
    const FS = 11;
    ctx.font = `${FS}px ${FONT}`;
    let tx = cx + PAD;
    const ty = topY + FS - 2;

    const segments = [];
    if (flowMing) {
      const fp = palOffset(palace.name, flowMing);
      if (fp) segments.push({ text:'流'+fp.charAt(0), color:'#c47800' });
    }
    if (decadeMing) {
      const dp = palOffset(palace.name, decadeMing);
      if (dp) segments.push({ text:'大'+dp.charAt(0), color:'#444444' });
    }
    segments.push({ text: palace.name, color:'#aaaaaa' });

    for (let i = 0; i < segments.length; i++) {
      if (i > 0) {
        ctx.fillStyle = '#dddddd';
        ctx.fillText('｜', tx, ty);
        tx += ctx.measureText('｜').width;
      }
      ctx.font = `${FS}px ${FONT}`;
      ctx.fillStyle = segments[i].color;
      ctx.fillText(segments[i].text, tx, ty);
      tx += ctx.measureText(segments[i].text).width;
    }
    topY = ty + 5;
  }

  // ── Decorative large dim branch glyph (background) ───
  ctx.font = `bold 48px ${FONT}`; ctx.fillStyle = '#f0eeea';
  ctx.textAlign = 'right';
  ctx.fillText(palace.branch, cx+CELL-6, cy+58);
  ctx.textAlign = 'left';

  // ── STARS START ────────────────────────────────────────
  const starsTop = Math.max(topY + 4, cy + (hasFlow ? 52 : 16));
  let sy = starsTop;
  const palMu = muMap[palace.name] || [];
  const botLim = cy + CELL - BOT;

  // Helper: draw one major star line
  function majorLine(name, brightness) {
    if (sy > botLim) return;
    const bc = BRIGHT_CLR[brightness] || '#999';

    ctx.font = `14px ${FONT}`; ctx.fillStyle = CLR_MAJOR;
    ctx.fillText(name, cx+PAD, sy);
    let sx = cx + PAD + ctx.measureText(name).width + 2;

    if (brightness) {
      ctx.font = `12px ${FONT}`; ctx.fillStyle = bc;
      ctx.fillText(brightness, sx, sy);
      sx += ctx.measureText(brightness).width + 3;
    }

    // Inline mutagen badges
    const starMu = palMu.filter(m => m.star === name);
    for (const mu of starMu) {
      if (sx > cx + CELL - 16) break;
      const info = MU_LIGHT[mu.type]; if (!info) continue;
      const pfx = mu.src==='year'?'生': mu.src==='decade'?'大':'流';
      sx = badgeL(ctx, pfx+info.key, mu.type, mu.src, sx, sy, 9);
    }
    sy += 22;  // generous line height for major stars
  }

  // Layer 1: Major stars
  if (palace.isEmpty && palace.borrowedFromPalace) {
    if (sy <= botLim) {
      ctx.font = `11px ${FONT}`; ctx.fillStyle = '#aaaaaa';
      ctx.fillText('空宮', cx+PAD, sy+11); sy += 16;
      if (sy <= botLim) {
        ctx.font = `11px ${FONT}`; ctx.fillStyle = '#888888';
        ctx.fillText('借 ' + palace.borrowedFromPalace, cx+PAD, sy+11); sy += 16;
        if (palace.borrowedStars?.length && sy <= botLim) {
          ctx.font = `13px ${FONT}`; ctx.fillStyle = '#555555';
          ctx.fillText(palace.borrowedStars.join('　'), cx+PAD, sy+13); sy += 18;
        }
      }
    }
  } else {
    for (const s of palace.majorStars||[]) majorLine(s.name, s.brightness);
  }
  if (sy > starsTop) sy += 6;  // gap after major stars

  // Helper: draw compact star token (name + brightness abbrev)
  function compactToken(st, color, x, y, fs) {
    ctx.font = `${fs}px ${FONT}`; ctx.fillStyle = color;
    const bright = st.brightness || '';
    const tok = st.name.slice(0,2) + bright;
    ctx.fillText(tok, x, y + fs);
    return x + ctx.measureText(tok).width + 5;
  }

  // Layer 2: Auxiliary stars (deep blue)
  const auxSt = (palace.minorStars||[]).filter(s => AUX_STARS.has(s.name));
  if (auxSt.length > 0 && sy <= botLim) {
    const afs = 11; let ax = cx+PAD, ay = sy, rows = 0;
    ctx.font = `${afs}px ${FONT}`;
    for (const st of auxSt) {
      const tok = st.name.slice(0,2)+(st.brightness||'');
      const aw = ctx.measureText(tok).width + 5;
      if (ax + aw > cx+CELL-PAD) {
        if (rows >= 1) break;
        ay += afs+4; ax = cx+PAD; rows++;
        if (ay > botLim) break;
      }
      ctx.fillStyle = BRIGHT_CLR[st.brightness] ? CLR_AUX : CLR_AUX;
      ctx.fillText(tok, ax, ay+afs);
      ax += aw;
      // Badges for aux stars
      const sMu = palMu.filter(m => m.star === st.name);
      for (const mu of sMu) {
        if (ax > cx+CELL-PAD) break;
        const info = MU_LIGHT[mu.type]; if (!info) continue;
        const pfx = mu.src==='year'?'生': mu.src==='decade'?'大':'流';
        ax = badgeL(ctx, pfx+info.key, mu.type, mu.src, ax, ay+afs, 8);
      }
    }
    sy = ay + afs + 8;
  }

  // Layer 3: Killing stars (red)
  const killSt = (palace.minorStars||[]).filter(s => KILL_STARS.has(s.name));
  if (killSt.length > 0 && sy <= botLim) {
    const kfs = 11; let kx = cx+PAD;
    ctx.font = `${kfs}px ${FONT}`;
    for (const st of killSt) {
      if (kx > cx+CELL-PAD) break;
      const tok = st.name.slice(0,2)+(st.brightness?.charAt(0)||'');
      ctx.fillStyle = CLR_KILL;
      ctx.fillText(tok, kx, sy+kfs);
      kx += ctx.measureText(tok).width + 5;
    }
    sy += kfs + 7;
  }

  // Layer 4: Small/misc stars (gray)
  const otherMin = (palace.minorStars||[]).filter(
    s => !AUX_STARS.has(s.name) && !KILL_STARS.has(s.name)
  );
  const smSt = [...otherMin, ...(palace.smallStars||[])];
  if (smSt.length > 0 && sy <= botLim - 4) {
    ctx.font = `10px ${FONT}`; ctx.fillStyle = CLR_SMALL;
    ctx.fillText(smSt.map(s=>s.name.charAt(0)).join(' '), cx+PAD, sy+10);
  }

  // ── BOTTOM: Palace name ────────────────────────────────
  ctx.font = `bold 16px ${FONT}`; ctx.fillStyle = '#1a1a1a';
  ctx.textAlign = 'center';
  ctx.fillText(palace.name, cx + CELL/2 - 10, cy + CELL - 16);
  ctx.textAlign = 'left';

  // ── BOTTOM-RIGHT: Stem ↑ Branch ↓ ─────────────────────
  ctx.font = `10px ${FONT}`; ctx.fillStyle = '#888888';
  ctx.textAlign = 'right';
  ctx.fillText(palace.stem,   cx+CELL-PAD, cy+CELL-24);
  ctx.fillText(palace.branch, cx+CELL-PAD, cy+CELL-12);
  ctx.textAlign = 'left';
}

// ════════════════════════════════════════════════════════
// CENTER 2×2 (minimal)
// ════════════════════════════════════════════════════════

function drawCenter(ctx) {
  const d = S.chartData, fd = S.flowData;
  const cx = CELL, cy = CELL, cw = 2*CELL, ch = 2*CELL;
  const mx = cx + cw/2;

  ctx.fillStyle = '#f9f8f4';
  ctx.fillRect(cx, cy, cw, ch);
  ctx.textAlign = 'center';

  if (!d) { ctx.textAlign='left'; return; }

  let iy = cy + 36;
  const lh = 20;

  // Name (only if provided)
  if (S.name) {
    ctx.font = `bold 20px ${FONT}`; ctx.fillStyle = '#1a1a1a';
    ctx.fillText(S.name, mx, iy); iy += 26;
  }

  // Birth info
  ctx.font = `12px ${FONT}`; ctx.fillStyle = '#555';
  ctx.fillText(`${S.birthDate}　${S.birthTime}　${S.gender}`, mx, iy); iy += lh;

  // Lunar date
  ctx.fillStyle = '#777';
  ctx.fillText(d.lunarDate, mx, iy); iy += lh;

  // 五行局 · 陰陽
  ctx.font = `bold 18px ${FONT}`; ctx.fillStyle = '#1a1a1a';
  ctx.fillText(`${d.fiveElementsClass}　·　${d.yinYang}`, mx, iy); iy += lh+4;

  // 命主星 · 身主星
  ctx.font = `12px ${FONT}`; ctx.fillStyle = '#555';
  ctx.fillText(`命主：${d.lifeStars?.mingZhu||'—'}　　身主：${d.lifeStars?.shenZhu||'—'}`, mx, iy); iy += lh;

  // 身宮 · 來因宮
  const bStr = d.bodyPalace     ? '身宮：' + d.bodyPalace.name     : '';
  const oStr = d.originalPalace ? '來因：' + d.originalPalace.name : '';
  ctx.fillText([bStr,oStr].filter(Boolean).join('　　'), mx, iy); iy += lh;

  // Separator
  ctx.strokeStyle = '#e0ded8'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx+40,iy+6); ctx.lineTo(cx+cw-40,iy+6); ctx.stroke();
  iy += 18;

  // Flow year (only if data exists)
  if (fd) {
    const fy = fd.flowYear, ml = fd.currentMajorLimit;

    // Large flow year display
    ctx.font = `300 34px ${FONT}`; ctx.fillStyle = '#1a1a1a';
    ctx.fillText(`${fy.year}　${fy.ganZhi}年`, mx, iy); iy += 42;

    ctx.font = `12px ${FONT}`; ctx.fillStyle = '#777';
    ctx.fillText(`虛齡 ${fy.chineseAge} 歲`, mx, iy); iy += lh;

    if (ml) {
      ctx.fillStyle = '#555';
      ctx.fillText(`大限：${ml.palace}宮　${ml.startYear}~${ml.endYear}`, mx, iy); iy += lh;
    }
  }

  // ── Triquetra watermark (light gray, bottom of center area) ──
  drawTriquetra(ctx, mx, cy + ch - 50, 36, '#d8d6d0');

  ctx.textAlign = 'left';
}

// ════════════════════════════════════════════════════════
// TRIQUETRA WATERMARK (Trinity Knot)
// ════════════════════════════════════════════════════════

function drawTriquetra(ctx, cx, cy, size, color) {
  // Three interlocking arcs forming a trinity knot.
  // Three circle centers at vertices of equilateral triangle.
  // Each circle radius = side length × √3/3 (circumradius pattern).
  const R = size * 0.42;
  const dy = size * 0.24;  // vertical offset of centers
  const dx = size * 0.42;  // horizontal offset
  const centers = [
    { x: cx,      y: cy - dy*1.4 },  // top
    { x: cx - dx, y: cy + dy },       // bottom-left
    { x: cx + dx, y: cy + dy },       // bottom-right
  ];

  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth   = Math.max(1.5, size * 0.045);
  ctx.lineCap     = 'round';
  for (const c of centers) {
    ctx.beginPath();
    ctx.arc(c.x, c.y, R, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

// ════════════════════════════════════════════════════════
// MAIN RENDER
// ════════════════════════════════════════════════════════

function renderChart() {
  const canvas = document.getElementById('chart-canvas');
  const ctx = setupCanvas(canvas);
  const d = S.chartData, fd = S.flowData;
  if (!d) return;

  const muMap      = buildMuMap(d.yearMutagens, fd?.currentMajorLimit?.mutagens, fd?.flowYearMutagens);
  const decadeMing = fd?.currentMajorLimit?.palace       || null;
  const flowMing   = fd?.flowYearLifePalace?.name        || null;  // 流年命宮（流年地支對應宮位）
  const minorLimPalace = fd?.minorLimitPalace?.name      || null;  // 小限宮（限標記）
  const origPalace = d.originalPalace?.name              || null;
  const bodyPalace = d.bodyPalace?.name                  || null;
  const birthYear  = parseInt(S.birthDate.split('-')[0]);

  drawGrid(ctx);
  for (const palace of d.palaces) {
    const pos = BRANCH_POS[palace.branch]; if (!pos) continue;
    drawPalace(ctx, palace, pos[0], pos[1], {
      muMap, decadeMing, flowMing, minorLimPalace,
      origPalace, bodyPalace, birthYear,
    });
  }
  drawCenter(ctx);
}

// ════════════════════════════════════════════════════════
// API
// ════════════════════════════════════════════════════════

async function apiChart(d, t, g) {
  const r = await fetch(`/api/chart?date=${encodeURIComponent(d)}&time=${encodeURIComponent(t)}&gender=${encodeURIComponent(g)}&_t=${ts()}`);
  const j = await r.json(); if (!r.ok) throw new Error(j.error||'HTTP '+r.status); return j;
}

async function apiFlow(d, t, g, y) {
  const r = await fetch(`/api/flow?date=${encodeURIComponent(d)}&time=${encodeURIComponent(t)}&gender=${encodeURIComponent(g)}&year=${y}&_t=${ts()}`);
  const j = await r.json(); if (!r.ok) throw new Error(j.error||'HTTP '+r.status); return j;
}

// ════════════════════════════════════════════════════════
// UI
// ════════════════════════════════════════════════════════

function updateMetaBar() {
  const d = S.chartData; if (!d) return;
  const mingPal = d.palaces.find(p=>p.name==='命宮');
  document.getElementById('meta-bar').innerHTML = [
    ['五行局', d.fiveElementsClass],
    ['陰陽',   d.yinYang],
    ['命宮',   mingPal?.stemBranch||'—'],
    ['身宮',   d.bodyPalace?.name||'—'],
    ['來因宮', d.originalPalace?.name||'—'],
  ].map(([l,v])=>`<div class="mi"><span class="ml">${l}</span><span class="mv">${v}</span></div>`)
   .join('<span class="msep">·</span>');
}

function updateFlowBar() {
  const fd = S.flowData;
  document.getElementById('fc-year').textContent = S.currentYear;
  if (!fd) return;
  const fy = fd.flowYear, ml = fd.currentMajorLimit;
  document.getElementById('fc-gz').textContent  = fy.ganZhi+'年';
  document.getElementById('fc-age').textContent = `虛齡${fy.chineseAge}歲`;
  document.getElementById('fc-limit').textContent = ml
    ? `大限：${ml.palace}宮　${ml.startYear}~${ml.endYear}` : '';
}

// ════════════════════════════════════════════════════════
// HANDLERS
// ════════════════════════════════════════════════════════

async function handleSubmit() {
  const date   = document.getElementById('f-date').value;
  const time   = document.getElementById('f-time').value;
  const gender = document.querySelector('input[name=g]:checked')?.value;
  const name   = document.getElementById('f-name').value.trim();
  const yv     = document.getElementById('f-year').value.trim();
  const err    = document.getElementById('form-err');

  err.style.display = 'none';
  if (!date||!time||!gender) {
    err.textContent = '請填寫生日、時間和性別。';
    err.style.display = 'block'; return;
  }

  const year = yv ? parseInt(yv) : new Date().getFullYear();
  Object.assign(S, { birthDate:date, birthTime:time, gender, name, currentYear:year });

  document.getElementById('input-panel').style.display = 'none';
  document.getElementById('chart-area').style.display  = 'none';
  document.getElementById('loading').style.display     = 'block';

  try {
    const [chartData, flowData] = await Promise.all([
      apiChart(date, time, gender),
      apiFlow(date, time, gender, year),
    ]);
    S.chartData = chartData; S.flowData = flowData;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('chart-area').style.display = 'block';
    updateMetaBar(); updateFlowBar(); renderChart();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('input-panel').style.display = 'block';
    err.textContent = '命盤計算失敗：' + e.message; err.style.display = 'block';
  }
}

async function changeYear(delta) {
  S.currentYear += delta;
  document.getElementById('fc-year').textContent = S.currentYear;
  ['fc-gz','fc-age','fc-limit'].forEach(id => document.getElementById(id).textContent='');
  try {
    S.flowData = await apiFlow(S.birthDate, S.birthTime, S.gender, S.currentYear);
    updateFlowBar(); renderChart();
  } catch(e) { console.error('Flow error:',e); }
}

function exportPNG() {
  const canvas = document.getElementById('chart-canvas');
  const link = document.createElement('a');
  const n = S.name ? S.name+'_' : '';
  link.download = `${n}${S.birthDate}_流年${S.currentYear}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function resetChart() {
  S.chartData=null; S.flowData=null;
  document.getElementById('chart-area').style.display  = 'none';
  document.getElementById('input-panel').style.display = 'block';
}

window.addEventListener('resize', () => { if (S.chartData) renderChart(); });
</script>
